<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sprite Slots — Item Sprite Assignments</title>
    <link rel="stylesheet" href="../css/sprites/monsters.css" />
    <link rel="stylesheet" href="../css/sprites/items.css" />
    <link rel="stylesheet" href="../css/sprites/tiles.css" />
    <link rel="stylesheet" href="../css/sprites/effects.css" />
    <link rel="stylesheet" href="../css/sprites/player.css" />
    <link rel="stylesheet" href="../css/sprites/buildings.css" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #1a1a1a;
        color: #ccc;
        font-family: "Segoe UI", Tahoma, sans-serif;
        height: 100vh;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }
      ::selection {
        background: #c9a84c;
        color: #1a1a1a;
      }
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #111;
      }
      ::-webkit-scrollbar-thumb {
        background: #444;
        border-radius: 3px;
      }

      /* Top bar */
      #topbar {
        background: #111;
        border-bottom: 1px solid #333;
        padding: 8px 16px;
        display: flex;
        align-items: center;
        gap: 12px;
        flex-shrink: 0;
      }
      #topbar h1 {
        font-size: 16px;
        color: #c9a84c;
        white-space: nowrap;
      }
      .btn {
        padding: 5px 12px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 12px;
        font-weight: 600;
        border: none;
      }
      .btn-gold {
        background: #c9a84c;
        color: #1a1a1a;
      }
      .btn-gold:hover {
        background: #dabb5e;
      }
      .btn-dim {
        background: #333;
        color: #999;
      }
      .btn-dim:hover {
        background: #444;
        color: #ccc;
      }
      .btn-danger {
        background: #633;
        color: #faa;
      }
      .btn-danger:hover {
        background: #844;
      }
      #progress {
        margin-left: auto;
        font-size: 12px;
        color: #888;
      }
      #progress b {
        color: #c9a84c;
      }

      /* Panels */
      #panels {
        display: flex;
        flex: 1;
        min-height: 0;
      }

      /* Left panel */
      #left {
        width: 22%;
        border-right: 1px solid #333;
        overflow-y: auto;
        background: #161616;
        flex-shrink: 0;
      }
      .cat-hdr {
        padding: 6px 12px;
        font-size: 13px;
        font-weight: 600;
        color: #c9a84c;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 6px;
        background: #1e1e1e;
        border-bottom: 1px solid #222;
        user-select: none;
      }
      .cat-hdr:hover {
        background: #252525;
      }
      .cat-arrow {
        font-size: 10px;
        transition: transform 0.15s;
        color: #888;
      }
      .cat-hdr.open .cat-arrow {
        transform: rotate(90deg);
      }
      .cat-badge {
        margin-left: auto;
        font-size: 10px;
        padding: 1px 6px;
        border-radius: 8px;
        font-weight: 600;
      }
      .cat-badge.empty {
        background: #633;
        color: #faa;
      }
      .cat-badge.ok {
        background: #263;
        color: #afa;
      }
      .cat-slots {
        display: none;
      }
      .cat-hdr.open + .cat-slots {
        display: block;
      }
      .slot-item {
        padding: 5px 12px 5px 28px;
        font-size: 12px;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 6px;
        border-bottom: 1px solid #1a1a1a;
        color: #999;
      }
      .slot-item:hover {
        background: #222;
        color: #ccc;
      }
      .slot-item.active {
        background: #446;
        color: #fff;
      }
      .slot-badge {
        font-size: 9px;
        padding: 1px 5px;
        border-radius: 6px;
        font-weight: 600;
        margin-left: auto;
      }
      .slot-badge.empty {
        background: #633;
        color: #faa;
      }
      .slot-badge.ok {
        background: #263;
        color: #afa;
      }

      /* Center panel */
      #center {
        width: 45%;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
      }
      #center-hdr {
        padding: 8px 16px;
        background: #1e1e1e;
        border-bottom: 1px solid #333;
        display: flex;
        align-items: center;
        gap: 10px;
        flex-shrink: 0;
      }
      #center-hdr h2 {
        font-size: 14px;
        color: #c9a84c;
      }
      #center-hdr .slot-count {
        font-size: 11px;
        color: #888;
      }
      #pool-grid {
        flex: 1;
        overflow-y: auto;
        padding: 12px;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-content: flex-start;
      }
      #pool-empty {
        display: none;
        padding: 40px;
        text-align: center;
        color: #555;
        font-size: 13px;
        width: 100%;
      }
      .pool-card {
        background: #222;
        border: 1px solid #333;
        border-radius: 6px;
        padding: 8px;
        width: 130px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        position: relative;
      }
      .pool-card.unique {
        border-color: #f90;
      }
      .pool-preview {
        width: 32px;
        height: 32px;
        position: relative;
        image-rendering: pixelated;
      }
      .pool-preview .sprite-box {
        position: absolute;
        top: 0;
        left: 0;
        width: 32px;
        height: 32px;
        image-rendering: pixelated;
      }
      .pool-layers {
        display: flex;
        gap: 3px;
        align-items: center;
        flex-wrap: wrap;
        justify-content: center;
      }
      .layer-thumb {
        width: 18px;
        height: 18px;
        border: 1px solid #444;
        border-radius: 2px;
        position: relative;
        cursor: grab;
        image-rendering: pixelated;
        overflow: hidden;
        flex-shrink: 0;
      }
      .layer-thumb .sprite-box {
        position: absolute;
        top: 0;
        left: 0;
        width: 18px;
        height: 18px;
        image-rendering: pixelated;
        transform: scale(0.5625);
        transform-origin: top left;
      }
      .layer-thumb.dragging {
        opacity: 0.4;
      }
      .layer-thumb.drag-over {
        border-color: #c9a84c;
      }
      .pool-actions {
        display: flex;
        gap: 4px;
        flex-wrap: wrap;
        justify-content: center;
      }
      .pool-actions .btn {
        font-size: 10px;
        padding: 2px 6px;
      }
      .pool-remove {
        position: absolute;
        top: 2px;
        right: 4px;
        cursor: pointer;
        color: #666;
        font-size: 14px;
        line-height: 1;
      }
      .pool-remove:hover {
        color: #f66;
      }
      .pool-unique-wrap {
        display: flex;
        align-items: center;
        gap: 4px;
        font-size: 10px;
        color: #888;
      }
      .pool-unique-wrap input {
        accent-color: #f90;
      }
      .pool-unique-lbl {
        color: #f90;
      }
      #center-footer {
        padding: 8px 16px;
        border-top: 1px solid #333;
        background: #1e1e1e;
        flex-shrink: 0;
        display: flex;
        gap: 8px;
      }

      /* Right panel */
      #right {
        width: 33%;
        border-left: 1px solid #333;
        display: flex;
        flex-direction: column;
        background: #161616;
        flex-shrink: 0;
      }
      #right.layer-mode {
        border-color: #c9a84c;
        box-shadow: inset 0 0 12px rgba(201, 168, 76, 0.15);
      }
      #right-hdr {
        padding: 6px 10px;
        background: #1e1e1e;
        border-bottom: 1px solid #333;
        display: flex;
        align-items: center;
        gap: 8px;
        flex-shrink: 0;
      }
      #right-hdr h3 {
        font-size: 13px;
        color: #c9a84c;
      }
      #layer-mode-bar {
        display: none;
        padding: 6px 10px;
        background: #3a3520;
        border-bottom: 1px solid #c9a84c;
        font-size: 11px;
        color: #c9a84c;
        text-align: center;
        flex-shrink: 0;
      }
      #layer-mode-bar .btn {
        margin-left: 8px;
      }
      #right.layer-mode #layer-mode-bar {
        display: block;
      }
      .browse-tabs {
        display: flex;
        gap: 2px;
        padding: 6px 8px;
        background: #151515;
        border-bottom: 1px solid #222;
        flex-shrink: 0;
        flex-wrap: wrap;
      }
      .browse-tab {
        padding: 3px 8px;
        border-radius: 3px;
        cursor: pointer;
        font-size: 11px;
        background: #222;
        color: #888;
        border: 1px solid #333;
      }
      .browse-tab:hover {
        color: #ccc;
      }
      .browse-tab.active {
        background: #c9a84c;
        color: #1a1a1a;
        border-color: #c9a84c;
        font-weight: 600;
      }
      #browse-search-row {
        display: flex;
        gap: 4px;
        margin: 6px 8px;
        flex-shrink: 0;
      }
      #browse-search {
        flex: 1;
        background: #222;
        border: 1px solid #444;
        color: #ccc;
        padding: 4px 8px;
        border-radius: 3px;
        font-size: 12px;
      }
      #browse-search:focus {
        outline: none;
        border-color: #c9a84c;
      }
      #browse-grid {
        flex: 1;
        overflow-y: auto;
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        padding: 8px;
        align-content: flex-start;
      }
      .browse-card {
        width: 74px;
        display: flex;
        flex-direction: column;
        align-items: center;
        cursor: pointer;
        padding: 3px;
        border-radius: 3px;
        border: 1px solid transparent;
      }
      .browse-card:hover {
        background: #2a2a2a;
        border-color: #444;
      }
      .browse-card .sprite-box {
        width: 32px;
        height: 32px;
        display: block;
        image-rendering: pixelated;
        transform: scale(2);
        transform-origin: top left;
        margin-right: 32px;
        margin-bottom: 32px;
      }
      .browse-card .browse-lbl {
        font-size: 7px;
        color: #666;
        text-align: center;
        word-break: break-all;
        line-height: 1;
        margin-top: 1px;
        max-height: 14px;
        overflow: hidden;
      }

      /* Toast */
      #toast {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: #c9a84c;
        color: #1a1a1a;
        padding: 6px 16px;
        border-radius: 4px;
        font-size: 13px;
        font-weight: 600;
        display: none;
        z-index: 300;
      }

      /* No-slot selected state */
      .no-slot-msg {
        padding: 40px;
        text-align: center;
        color: #555;
        font-size: 13px;
      }

      /* Hidden file input */
      #file-input {
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="topbar">
      <h1>Sprite Slots &mdash; Item Sprite Assignments</h1>
      <button class="btn btn-gold" id="btn-download">Download Config</button>
      <button class="btn btn-dim" id="btn-load">Load Config</button>
      <input type="file" id="file-input" accept=".json" />
      <span id="progress"><b>0</b> of <b>0</b> slots configured</span>
    </div>

    <div id="panels">
      <!-- Left: Slot Navigator -->
      <div id="left"></div>

      <!-- Center: Sprite Pool -->
      <div id="center">
        <div id="center-hdr">
          <h2 id="slot-title">Select a slot</h2>
          <span class="slot-count" id="slot-count"></span>
          <button
            class="btn btn-danger"
            id="btn-clear-all"
            style="margin-left: auto; display: none"
          >
            Clear All
          </button>
        </div>
        <div id="pool-grid">
          <div id="pool-empty" class="no-slot-msg">
            Select a slot from the left panel to begin.
          </div>
        </div>
        <div id="center-footer" style="display: none">
          <button class="btn btn-gold" id="btn-add-sprites">Add Sprites</button>
        </div>
      </div>

      <!-- Right: Sprite Browser -->
      <div id="right">
        <div id="right-hdr">
          <h3>Sprite Browser</h3>
        </div>
        <div id="layer-mode-bar">
          Adding layer &mdash; click a sprite below
          <button class="btn btn-dim" id="btn-layer-done">Done</button>
        </div>
        <div class="browse-tabs" id="browse-tabs"></div>
        <div id="browse-search-row">
          <input
            id="browse-search"
            type="text"
            placeholder="Search sprites..."
          />
          <button class="btn btn-gold" id="btn-add-all">Add All</button>
        </div>
        <div id="browse-grid"></div>
      </div>
    </div>

    <div id="toast"></div>

    <script>
      /* ========== DATA ========== */
      const STORAGE_KEY = "rd-sprite-slots";
      const SHEETS = ["monsters", "items", "tiles", "effects", "player"];

      var SLOTS = {
        Weapons: [
          "club",
          "dagger",
          "spear",
          "mace",
          "short-sword",
          "flail",
          "long-sword",
          "battle-axe",
          "two-handed-sword",
          "elven-long-sword",
          "elven-dagger",
          "elven-spear",
          "elven-mace",
          "elven-battle-axe",
          "meteoric-long-sword",
          "meteoric-battle-axe",
          "meteoric-flail",
          "meteoric-two-handed-sword",
          "blooddrinker",
          "worldsplitter",
        ],
        "Body Armor": [
          "leather-armor",
          "studded-leather",
          "chain-mail",
          "plate-mail",
          "elven-chain-mail",
          "meteoric-plate-mail",
          "demonhide-armor",
        ],
        Shields: [
          "small-wood-shield",
          "small-iron-shield",
          "elven-shield",
          "meteoric-shield",
          "aegis-of-the-fallen",
        ],
        Helmets: [
          "leather-cap",
          "iron-helm",
          "elven-helmet",
          "meteoric-helm",
          "helm-of-true-sight",
          "helm-of-storms",
        ],
        Gauntlets: [
          "leather-gloves",
          "iron-gloves",
          "elven-gloves",
          "meteoric-gloves",
          "gauntlets-of-the-forge",
        ],
        Boots: [
          "leather-boots",
          "iron-boots",
          "elven-boots",
          "meteoric-boots",
          "boots-of-levitation",
        ],
        Cloaks: [
          "cloak",
          "fine-cloak",
          "elven-cloak",
          "meteoric-cloak",
          "cloak-of-shadows",
        ],
        Belts: [
          "belt",
          "leather-belt",
          "elven-belt",
          "meteoric-belt",
          "belt-of-the-titan",
        ],
        Rings: [
          "ring",
          "elven-ring",
          "meteoric-ring",
          "ring-of-fortune",
          "ring-of-the-archmage",
        ],
        Amulets: [
          "amulet",
          "elven-amulet",
          "meteoric-amulet",
          "amulet-fire-ward",
          "amulet-frost-ward",
          "amulet-storm-ward",
          "amulet-soul-ward",
          "elemental-keystone",
          "crown-of-ancients",
        ],
        Packs: [
          "small-pack",
          "large-pack",
          "elven-pack",
          "meteoric-pack",
          "pack-of-holding",
        ],
        Potions: [
          "potion-heal-minor",
          "potion-heal-medium",
          "potion-heal-major",
          "potion-gain-str",
          "potion-gain-int",
          "potion-gain-con",
          "potion-gain-dex",
        ],
        Spellbooks: [
          "book-levitation",
          "book-clairvoyance",
          "book-lightning-bolt",
          "book-fire-bolt",
          "book-resist-fire",
          "book-resist-cold",
          "book-resist-lightning",
          "book-sleep-monster",
          "book-slow-monster",
          "book-cold-ball",
          "book-teleport",
          "book-remove-curse",
          "book-ball-lightning",
          "book-fire-ball",
          "book-transmogrify",
          "book-time-stop",
          "book-warcry",
        ],
        Currency: ["gold-coins"],
        "Ground FX": ["treasure-pile"],
      };

      const UNIQUE_ITEMS = new Set([
        "blooddrinker",
        "worldsplitter",
        "demonhide-armor",
        "aegis-of-the-fallen",
        "helm-of-true-sight",
        "helm-of-storms",
        "gauntlets-of-the-forge",
        "boots-of-levitation",
        "cloak-of-shadows",
        "belt-of-the-titan",
        "ring-of-fortune",
        "ring-of-the-archmage",
        "amulet-fire-ward",
        "amulet-frost-ward",
        "amulet-storm-ward",
        "amulet-soul-ward",
        "elemental-keystone",
        "crown-of-ancients",
        "pack-of-holding",
      ]);

      let manifest = {};
      let config = {};
      let activeSlot = null;
      let layerMode = null; // null or { cardIdx: number }
      let browseSheet = "items";
      let browseSearch = "";

      /* ========== HELPERS ========== */
      function allSlotKeys() {
        let keys = [];
        for (let cat of Object.keys(SLOTS)) {
          for (let id of SLOTS[cat]) keys.push(id);
        }
        return keys;
      }

      function prettyName(id) {
        return id.replace(/-/g, " ").replace(/\b\w/g, (c) => c.toUpperCase());
      }

      function getPool(key) {
        return config[key] || [];
      }

      function setPool(key, pool) {
        config[key] = pool;
        save();
      }

      function save() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(config));
        updateProgress();
      }

      function load(data) {
        config = data || {};
        save();
        renderNav();
        renderPool();
      }

      function toast(msg) {
        let t = document.getElementById("toast");
        t.textContent = msg;
        t.style.display = "block";
        setTimeout(() => (t.style.display = "none"), 1500);
      }

      /* ========== PROGRESS ========== */
      function updateProgress() {
        let keys = allSlotKeys();
        let done = keys.filter((k) => (config[k] || []).length > 0).length;
        let el = document.getElementById("progress");
        el.textContent = "";
        let b1 = document.createElement("b");
        b1.textContent = done;
        let b2 = document.createElement("b");
        b2.textContent = keys.length;
        el.appendChild(b1);
        el.appendChild(document.createTextNode(" of "));
        el.appendChild(b2);
        el.appendChild(document.createTextNode(" slots configured"));
      }

      /* ========== LEFT NAV ========== */
      function renderNav() {
        let $left = document.getElementById("left");
        $left.textContent = "";

        for (let cat of Object.keys(SLOTS)) {
          let items = SLOTS[cat];
          let configured = items.filter(
            (k) => (config[k] || []).length > 0,
          ).length;

          let hdr = document.createElement("div");
          hdr.className = "cat-hdr";

          let arrow = document.createElement("span");
          arrow.className = "cat-arrow";
          arrow.textContent = "\u25B6";
          hdr.appendChild(arrow);

          let name = document.createElement("span");
          name.textContent = cat;
          hdr.appendChild(name);

          let badge = document.createElement("span");
          badge.className = "cat-badge " + (configured > 0 ? "ok" : "empty");
          badge.textContent = configured + "/" + items.length;
          hdr.appendChild(badge);

          $left.appendChild(hdr);

          let slotsDiv = document.createElement("div");
          slotsDiv.className = "cat-slots";

          for (let id of items) {
            let item = makeSlotItem(id);
            slotsDiv.appendChild(item);
          }

          $left.appendChild(slotsDiv);

          hdr.addEventListener("click", () => {
            hdr.classList.toggle("open");
          });

          if (activeSlot && items.includes(activeSlot)) {
            hdr.classList.add("open");
          }
        }
      }

      function makeSlotItem(key) {
        let item = document.createElement("div");
        item.className = "slot-item";
        if (key === activeSlot) item.classList.add("active");

        let txt = document.createElement("span");
        txt.textContent = prettyName(key);
        item.appendChild(txt);

        if (UNIQUE_ITEMS.has(key)) {
          let uBadge = document.createElement("span");
          uBadge.style.cssText =
            "color:#f90;font-size:10px;font-weight:600;margin-left:4px";
          uBadge.textContent = "(U)";
          item.appendChild(uBadge);
        }

        let count = (config[key] || []).length;
        let badge = document.createElement("span");
        badge.className = "slot-badge " + (count > 0 ? "ok" : "empty");
        badge.textContent = count;
        item.appendChild(badge);

        item.addEventListener("click", (e) => {
          e.stopPropagation();
          activeSlot = key;
          exitLayerMode();
          renderNav();
          renderPool();
          document.getElementById("center-footer").style.display = "flex";
        });

        return item;
      }

      /* ========== CENTER POOL ========== */
      function renderPool() {
        let $title = document.getElementById("slot-title");
        let $count = document.getElementById("slot-count");
        let $grid = document.getElementById("pool-grid");
        if (!$title || !$count || !$grid) return;

        while ($grid.firstChild) $grid.removeChild($grid.firstChild);

        function showEmpty(msg) {
          var em = document.createElement("div");
          em.className = "no-slot-msg";
          em.style.display = "block";
          em.textContent = msg;
          $grid.appendChild(em);
        }

        let $clearAll = document.getElementById("btn-clear-all");
        if (!activeSlot) {
          $title.textContent = "Select a slot";
          $count.textContent = "";
          if ($clearAll) $clearAll.style.display = "none";
          showEmpty("Select a slot from the left panel to begin.");
          document.getElementById("center-footer").style.display = "none";
          return;
        }

        $title.textContent = prettyName(activeSlot);
        let pool = getPool(activeSlot);
        $count.textContent = pool.length + " sprite(s)";
        if ($clearAll)
          $clearAll.style.display = pool.length > 0 ? "inline-block" : "none";

        if (pool.length === 0) {
          showEmpty(
            "No sprites assigned. Use the browser on the right to add sprites.",
          );
          return;
        }

        for (let i = 0; i < pool.length; i++) {
          let entry = pool[i];
          let card = document.createElement("div");
          card.className = "pool-card";
          if (entry.uniqueOnly) card.classList.add("unique");

          // Remove button
          let rm = document.createElement("span");
          rm.className = "pool-remove";
          rm.textContent = "\u00D7";
          rm.addEventListener("click", () => {
            pool.splice(i, 1);
            setPool(activeSlot, pool);
            renderNav();
            renderPool();
            renderBrowser();
          });
          card.appendChild(rm);

          // Composite preview
          let preview = document.createElement("div");
          preview.className = "pool-preview";
          for (let cls of entry.layers) {
            let box = document.createElement("div");
            box.className = "sprite-box " + cls;
            preview.appendChild(box);
          }
          card.appendChild(preview);

          // Layer thumbs
          let layersDiv = document.createElement("div");
          layersDiv.className = "pool-layers";
          for (let li = 0; li < entry.layers.length; li++) {
            let thumb = document.createElement("div");
            thumb.className = "layer-thumb";
            thumb.draggable = true;
            thumb.dataset.idx = li;
            thumb.dataset.card = i;

            let box = document.createElement("div");
            box.className = "sprite-box " + entry.layers[li];
            thumb.appendChild(box);

            // Drag events for reorder
            thumb.addEventListener("dragstart", (e) => {
              thumb.classList.add("dragging");
              e.dataTransfer.setData(
                "text/plain",
                JSON.stringify({ card: i, layer: li }),
              );
            });
            thumb.addEventListener("dragend", () =>
              thumb.classList.remove("dragging"),
            );
            thumb.addEventListener("dragover", (e) => {
              e.preventDefault();
              thumb.classList.add("drag-over");
            });
            thumb.addEventListener("dragleave", () =>
              thumb.classList.remove("drag-over"),
            );
            thumb.addEventListener("drop", (e) => {
              e.preventDefault();
              thumb.classList.remove("drag-over");
              let src = JSON.parse(e.dataTransfer.getData("text/plain"));
              if (src.card !== i) return;
              let arr = entry.layers;
              let moved = arr.splice(src.layer, 1)[0];
              arr.splice(li, 0, moved);
              setPool(activeSlot, pool);
              renderPool();
            });

            layersDiv.appendChild(thumb);
          }
          card.appendChild(layersDiv);

          // Unique checkbox
          let uWrap = document.createElement("label");
          uWrap.className = "pool-unique-wrap";
          let uCheck = document.createElement("input");
          uCheck.type = "checkbox";
          uCheck.checked = entry.uniqueOnly;
          uCheck.addEventListener("change", () => {
            entry.uniqueOnly = uCheck.checked;
            setPool(activeSlot, pool);
            renderPool();
          });
          uWrap.appendChild(uCheck);
          let uLbl = document.createElement("span");
          uLbl.className = entry.uniqueOnly ? "pool-unique-lbl" : "";
          uLbl.textContent = "Unique Only";
          uWrap.appendChild(uLbl);
          card.appendChild(uWrap);

          // Actions
          let acts = document.createElement("div");
          acts.className = "pool-actions";

          let addLayerBtn = document.createElement("button");
          addLayerBtn.className = "btn btn-dim";
          addLayerBtn.textContent = "Add Layer";
          addLayerBtn.addEventListener("click", () => enterLayerMode(i));
          acts.appendChild(addLayerBtn);

          // Remove last layer if > 1
          if (entry.layers.length > 1) {
            let rmLayer = document.createElement("button");
            rmLayer.className = "btn btn-danger";
            rmLayer.textContent = "- Layer";
            rmLayer.addEventListener("click", () => {
              entry.layers.pop();
              setPool(activeSlot, pool);
              renderPool();
            });
            acts.appendChild(rmLayer);
          }

          card.appendChild(acts);
          $grid.appendChild(card);
        }
      }

      /* ========== LAYER MODE ========== */
      function enterLayerMode(cardIdx) {
        layerMode = { cardIdx };
        document.getElementById("right").classList.add("layer-mode");
        renderPool();
      }

      function exitLayerMode() {
        layerMode = null;
        document.getElementById("right").classList.remove("layer-mode");
      }

      document
        .getElementById("btn-layer-done")
        .addEventListener("click", () => {
          exitLayerMode();
          renderPool();
        });

      /* ========== RIGHT BROWSER ========== */
      function buildBrowseTabs() {
        let $tabs = document.getElementById("browse-tabs");
        $tabs.textContent = "";
        for (let s of SHEETS) {
          let tab = document.createElement("div");
          tab.className = "browse-tab" + (s === browseSheet ? " active" : "");
          tab.textContent = s.charAt(0).toUpperCase() + s.slice(1);
          tab.addEventListener("click", () => {
            browseSheet = s;
            buildBrowseTabs();
            renderBrowser();
          });
          $tabs.appendChild(tab);
        }
      }

      document
        .getElementById("browse-search")
        .addEventListener("input", (e) => {
          browseSearch = e.target.value.toLowerCase();
          renderBrowser();
        });

      // Build set of all sprite classes assigned to ANY slot
      function getAllAssignedSprites() {
        var assigned = new Set();
        var keys = allSlotKeys();
        for (var i = 0; i < keys.length; i++) {
          var pool = getPool(keys[i]);
          for (var j = 0; j < pool.length; j++) {
            for (var k = 0; k < pool[j].layers.length; k++) {
              assigned.add(pool[j].layers[k]);
            }
          }
        }
        return assigned;
      }

      function renderBrowser() {
        let $grid = document.getElementById("browse-grid");
        $grid.textContent = "";
        let sheet = manifest[browseSheet];
        if (!sheet) return;

        let sprites = sheet.sprites;
        if (browseSearch) {
          sprites = sprites.filter((s) =>
            s.className.toLowerCase().includes(browseSearch),
          );
        }

        let assigned = getAllAssignedSprites();
        let frag = document.createDocumentFragment();
        for (let sp of sprites) {
          let card = document.createElement("div");
          card.className = "browse-card";
          if (assigned.has(sp.className)) {
            card.style.opacity = "0.5";
          }

          let box = document.createElement("div");
          box.className = "sprite-box " + sp.className;
          card.appendChild(box);

          let lbl = document.createElement("div");
          lbl.className = "browse-lbl";
          lbl.textContent = sp.className;
          card.appendChild(lbl);

          card.addEventListener("click", () => onBrowseClick(sp.className));
          frag.appendChild(card);
        }
        $grid.appendChild(frag);
      }

      function onBrowseClick(className) {
        if (!activeSlot) {
          toast("Select a slot first");
          return;
        }

        let pool = getPool(activeSlot);

        if (layerMode) {
          // Add as layer to the specific card
          let entry = pool[layerMode.cardIdx];
          if (entry) {
            entry.layers.push(className);
            setPool(activeSlot, pool);
            renderPool();
            renderBrowser();
            toast("Layer added: " + className);
          }
        } else {
          // Add new sprite entry
          pool.push({ layers: [className], uniqueOnly: false });
          setPool(activeSlot, pool);
          renderNav();
          renderPool();
          renderBrowser();
          toast("Added: " + className);
        }
      }

      document
        .getElementById("btn-add-sprites")
        .addEventListener("click", () => {
          exitLayerMode();
          document.getElementById("browse-search").focus();
        });

      // Add All visible/filtered sprites
      document.getElementById("btn-add-all").addEventListener("click", () => {
        if (!activeSlot) {
          toast("Select a slot first");
          return;
        }
        let sheet = manifest[browseSheet];
        if (!sheet) return;
        let sprites = sheet.sprites;
        if (browseSearch) {
          sprites = sprites.filter((s) =>
            s.className.toLowerCase().includes(browseSearch),
          );
        }
        if (sprites.length === 0) {
          toast("No sprites to add");
          return;
        }
        let pool = getPool(activeSlot);
        for (let sp of sprites) {
          pool.push({ layers: [sp.className], uniqueOnly: false });
        }
        setPool(activeSlot, pool);
        renderNav();
        renderPool();
        renderBrowser();
        toast("Added " + sprites.length + " sprites");
      });

      // Clear All sprites from current slot
      document.getElementById("btn-clear-all").addEventListener("click", () => {
        if (!activeSlot) return;
        setPool(activeSlot, []);
        renderNav();
        renderPool();
        renderBrowser();
        toast("Pool cleared");
      });

      /* ========== SAVE / LOAD ========== */
      document.getElementById("btn-download").addEventListener("click", () => {
        let blob = new Blob([JSON.stringify(config, null, 2)], {
          type: "application/json",
        });
        let a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "sprite-slots.json";
        a.click();
        URL.revokeObjectURL(a.href);
        toast("Config downloaded");
      });

      document.getElementById("btn-load").addEventListener("click", () => {
        document.getElementById("file-input").click();
      });

      document.getElementById("file-input").addEventListener("change", (e) => {
        let file = e.target.files[0];
        if (!file) return;
        let reader = new FileReader();
        reader.onload = (ev) => {
          try {
            let data = JSON.parse(ev.target.result);
            load(data);
            toast("Config loaded");
          } catch (err) {
            toast("Invalid JSON file");
          }
        };
        reader.readAsText(file);
        e.target.value = "";
      });

      /* ========== INIT ========== */
      // Load from localStorage
      try {
        let stored = localStorage.getItem(STORAGE_KEY);
        if (stored) config = JSON.parse(stored);
      } catch (e) {
        config = {};
      }

      // Fetch manifest and boot
      fetch("../sprites-manifest.json")
        .then((r) => r.json())
        .then((data) => {
          manifest = data;
          buildBrowseTabs();
          renderBrowser();
          renderNav();
          updateProgress();
          renderPool();
        })
        .catch((err) => {
          document.getElementById("browse-grid").textContent = "";
          let msg = document.createElement("div");
          msg.style.cssText =
            "padding:20px;color:#c44;font-size:12px;text-align:center";
          msg.textContent = "Failed to load manifest: " + err.message;
          document.getElementById("browse-grid").appendChild(msg);
        });
    </script>
  </body>
</html>
