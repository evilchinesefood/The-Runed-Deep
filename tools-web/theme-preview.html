    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #1a1a1a;
        color: #d4c9a8;
        font-family: "Courier New", monospace;
        padding: 24px;
      }
      h1 {
        text-align: center;
        color: #f0e6c8;
        margin-bottom: 32px;
        font-size: 28px;
        letter-spacing: 2px;
      }
      .themes {
        display: flex;
        flex-wrap: wrap;
        gap: 32px;
        justify-content: center;
      }
      .theme-section {
        background: #222;
        border: 1px solid #444;
        border-radius: 6px;
        padding: 16px;
      }
      .theme-header {
        margin-bottom: 12px;
      }
      .theme-name {
        font-size: 20px;
        color: #f0e6c8;
      }
      .theme-depth {
        font-size: 13px;
        color: #888;
        margin-top: 2px;
      }
      .room-grid {
        display: grid;
        gap: 0;
      }
      .room-grid > div {
        width: 32px;
        height: 32px;
      }
      .tile-ref {
        margin-top: 10px;
        font-size: 11px;
        color: #666;
        max-width: 384px;
        line-height: 1.5;
      }
      .tile-ref span {
        color: #888;
      }
      .monsters-section {
        margin-top: 14px;
        border-top: 1px solid #333;
        padding-top: 10px;
      }
      .monsters-label {
        font-size: 13px;
        color: #b8a87a;
        margin-bottom: 8px;
      }
      .monsters-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }
      .monster-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 48px;
      }
      .monster-card .sprite-wrap {
        width: 32px;
        height: 32px;
        border: 2px solid #555;
        border-radius: 3px;
        background: #181818;
      }
      .monster-card.boss .sprite-wrap {
        border-color: #d48a1e;
        box-shadow: 0 0 4px #d48a1e88;
      }
      .monster-card .monster-name {
        font-size: 9px;
        color: #888;
        text-align: center;
        margin-top: 2px;
        line-height: 1.1;
        word-break: break-word;
      }
      .monster-card.boss .monster-name {
        color: #d48a1e;
      }
    </style>
  </head>

      function getMonstersForTheme(themeMin, themeMax) {
        return MONSTERS.filter(function (m) {
          return m.minFloor <= themeMax && m.maxFloor >= themeMin;
        }).sort(function (a, b) {
          if (a.boss !== b.boss) return a.boss ? 1 : -1;
          return a.minFloor - b.minFloor;
        });
      }

      function renderMonsters(container, themeMin, themeMax) {
        var monsters = getMonstersForTheme(themeMin, themeMax);
        if (!monsters.length) return;

        var section = document.createElement("div");
        section.className = "monsters-section";

        var regular = monsters.filter(function (m) {
          return !m.boss;
        });
        var bosses = monsters.filter(function (m) {
          return m.boss;
        });

        var label = document.createElement("div");
        label.className = "monsters-label";
        label.textContent =
          "Monsters (Floors " + themeMin + "-" + themeMax + "):";
        section.appendChild(label);

        var grid = document.createElement("div");
        grid.className = "monsters-grid";
        for (var i = 0; i < regular.length; i++) {
          grid.appendChild(makeMonsterCard(regular[i]));
        }
        section.appendChild(grid);

        if (bosses.length) {
          var bLabel = document.createElement("div");
          bLabel.className = "monsters-label";
          bLabel.style.marginTop = "10px";
          bLabel.textContent = "Boss:";
          section.appendChild(bLabel);

          var bGrid = document.createElement("div");
          bGrid.className = "monsters-grid";
          for (var j = 0; j < bosses.length; j++) {
            bGrid.appendChild(makeMonsterCard(bosses[j]));
          }
          section.appendChild(bGrid);
        }

        container.appendChild(section);
      }

      function makeMonsterCard(m) {
        var card = document.createElement("div");
        card.className = "monster-card" + (m.boss ? " boss" : "");

        var wrap = document.createElement("div");
        wrap.className = "sprite-wrap";

        var sprite = document.createElement("div");
        sprite.className = m.sprite;
        sprite.style.width = "32px";
        sprite.style.height = "32px";
        wrap.appendChild(sprite);

        var name = document.createElement("div");
        name.className = "monster-name";
        name.textContent = m.name;

        card.appendChild(wrap);
        card.appendChild(name);
        return card;
      }

      function pick(arr) {
        return arr[Math.floor(Math.random() * arr.length)];
      }

      function renderRoom(container, theme) {
        var W = 12,
          H = 8;
        var grid = document.createElement("div");
        grid.className = "room-grid";
        grid.style.gridTemplateColumns = "repeat(" + W + ", 32px)";

        // Precompute special positions
        // Door: middle of right wall
        var doorX = W - 1,
          doorY = Math.floor(H / 2);
        // Stairs up: top-left interior
        var suX = 1,
          suY = 1;
        // Stairs down: bottom-right interior
        var sdX = W - 2,
          sdY = H - 2;
        // Decor: 3 scattered interior positions
        var decorPositions = [
          { x: 3, y: 3 },
          { x: 7, y: 2 },
          { x: 5, y: 5 },
        ];
        var decorSet = {};
        for (var d = 0; d < decorPositions.length; d++) {
          decorSet[decorPositions[d].x + "," + decorPositions[d].y] = true;
        }

        for (var y = 0; y < H; y++) {
          for (var x = 0; x < W; x++) {
            var cell = document.createElement("div");
            var key = x + "," + y;
            var isWall = y === 0 || y === H - 1 || x === 0 || x === W - 1;

            if (x === doorX && y === doorY) {
              cell.className = pick(theme.doorClosed);
            } else if (x === suX && y === suY) {
              cell.className = pick(theme.stairsUp);
            } else if (x === sdX && y === sdY) {
              cell.className = pick(theme.stairsDown);
            } else if (!isWall && decorSet[key]) {
              cell.className = pick(theme.decor);
            } else if (isWall) {
              cell.className = pick(theme.walls);
            } else {
              cell.className = pick(theme.floors);
            }

            grid.appendChild(cell);
          }
        }

        container.appendChild(grid);
      }

      function buildPage() {
        var root = document.getElementById("themes");

        for (var i = 0; i < THEMES.length; i++) {
          var t = THEMES[i];
          var section = document.createElement("div");
          section.className = "theme-section";

          var header = document.createElement("div");
          header.className = "theme-header";

          var name = document.createElement("div");
          name.className = "theme-name";
          name.textContent = t.name;

          var depth = document.createElement("div");
          depth.className = "theme-depth";
          depth.textContent = "Depths " + t.depthMin + " – " + t.depthMax;

          header.appendChild(name);
          header.appendChild(depth);
          section.appendChild(header);

          renderRoom(section, t);
          renderMonsters(section, t.depthMin, t.depthMax);

          // Reference info
          var ref = document.createElement("div");
          ref.className = "tile-ref";

          var wLabel = document.createElement("span");
          wLabel.textContent = "Walls: ";
          ref.appendChild(wLabel);
          ref.appendChild(document.createTextNode(t.walls.join(", ")));
          ref.appendChild(document.createElement("br"));

          var fLabel = document.createElement("span");
          fLabel.textContent = "Floors: ";
          ref.appendChild(fLabel);
          ref.appendChild(document.createTextNode(t.floors.join(", ")));

          section.appendChild(ref);
          root.appendChild(section);
        }
      }

      buildPage();
    </script>
