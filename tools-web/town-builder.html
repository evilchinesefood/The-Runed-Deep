<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Town Builder — The Runed Deep</title>
    <link rel="stylesheet" href="../css/sprites/tiles.css" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      :root {
        --bg: #1a1a1a;
        --bg2: #222;
        --bg3: #2a2a2a;
        --gold: #c9a84c;
        --gold2: #e0c068;
        --border: #444;
        --text: #ddd;
        --text2: #999;
        --green: #4caf50;
        --orange: #ff9800;
        --red: #e74c3c;
        --panel: 260px;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: "Segoe UI", system-ui, sans-serif;
        font-size: 14px;
        overflow: hidden;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }
      button {
        background: var(--bg3);
        color: var(--text);
        border: 1px solid var(--border);
        padding: 4px 12px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 13px;
      }
      button:hover {
        border-color: var(--gold);
        color: var(--gold);
      }
      button.active {
        background: var(--gold);
        color: #111;
        border-color: var(--gold2);
      }
      input,
      select {
        background: var(--bg3);
        color: var(--text);
        border: 1px solid var(--border);
        padding: 4px 8px;
        border-radius: 4px;
        font-size: 13px;
      }
      input:focus,
      select:focus {
        outline: none;
        border-color: var(--gold);
      }
      label {
        color: var(--text2);
        font-size: 12px;
      }

      #topbar {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 12px;
        background: var(--bg2);
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
        flex-wrap: wrap;
      }
      #topbar h1 {
        font-size: 16px;
        color: var(--gold);
        margin-right: 12px;
        white-space: nowrap;
      }
      .topbar-group {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .topbar-sep {
        width: 1px;
        height: 24px;
        background: var(--border);
        margin: 0 4px;
      }

      #app {
        display: flex;
        flex: 1;
        overflow: hidden;
      }
      .panel {
        width: var(--panel);
        background: var(--bg2);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        flex-shrink: 0;
      }
      .panel.right {
        border-right: none;
        border-left: 1px solid var(--border);
      }
      .panel h3 {
        padding: 8px 10px;
        font-size: 13px;
        color: var(--gold);
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
      }
      #center {
        flex: 1;
        overflow: auto;
        position: relative;
        cursor: crosshair;
      }

      /* Tile palette */
      #palette-search {
        margin: 6px 8px;
        width: calc(100% - 16px);
      }
      #palette-tabs {
        display: flex;
        flex-wrap: wrap;
        gap: 2px;
        padding: 4px 6px;
        flex-shrink: 0;
      }
      #palette-tabs button {
        padding: 2px 6px;
        font-size: 11px;
        border-radius: 3px;
      }
      #palette-grid {
        flex: 1;
        overflow-y: auto;
        padding: 6px;
        display: flex;
        flex-wrap: wrap;
        gap: 2px;
        align-content: flex-start;
      }
      .palette-tile {
        width: 34px;
        height: 34px;
        border: 1px solid transparent;
        border-radius: 2px;
        cursor: pointer;
        position: relative;
        flex-shrink: 0;
      }
      .palette-tile:hover {
        border-color: var(--gold);
      }
      .palette-tile.selected {
        border-color: var(--gold);
        box-shadow: 0 0 6px var(--gold);
      }
      .palette-tile .tile {
        display: block;
      }
      .palette-tile[title]:hover::after {
        content: attr(title);
        position: absolute;
        bottom: -20px;
        left: 0;
        background: #000;
        color: #fff;
        font-size: 10px;
        padding: 1px 4px;
        border-radius: 2px;
        white-space: nowrap;
        z-index: 10;
        pointer-events: none;
      }

      /* Building palette */
      .building-thumb {
        padding: 6px 8px;
        cursor: pointer;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .building-thumb:hover {
        background: var(--bg3);
      }
      .building-thumb.selected {
        background: var(--gold);
        color: #111;
      }
      .building-thumb-name {
        font-size: 12px;
      }
      .building-thumb-size {
        font-size: 10px;
        color: var(--text2);
      }

      /* Right panel tools */
      #tools-wrap {
        display: flex;
        flex-wrap: wrap;
        gap: 3px;
        padding: 6px 8px;
      }
      #tools-wrap button {
        font-size: 11px;
        padding: 3px 7px;
      }
      .prop-group {
        padding: 8px 10px;
        border-bottom: 1px solid var(--border);
      }
      .prop-group label {
        display: block;
        margin-bottom: 2px;
      }

      /* Tab bar for left panel */
      .panel-tabs {
        display: flex;
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
      }
      .panel-tabs button {
        flex: 1;
        padding: 6px 4px;
        font-size: 12px;
        border: none;
        border-bottom: 2px solid transparent;
        border-radius: 0;
        background: transparent;
        color: var(--text2);
      }
      .panel-tabs button:hover {
        color: var(--text);
      }
      .panel-tabs button.active {
        color: var(--gold);
        border-bottom-color: var(--gold);
        background: transparent;
      }

      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: var(--bg);
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--gold);
      }

      #statusbar {
        padding: 4px 12px;
        background: var(--bg2);
        border-top: 1px solid var(--border);
        font-size: 11px;
        color: var(--text2);
        flex-shrink: 0;
        display: flex;
        gap: 16px;
      }
    </style>
  </head>
  <body>
    <div id="topbar">
      <h1>Town Builder</h1>
      <div class="topbar-group">
        <button id="btn-zoom">Zoom: 16px</button>
        <div class="topbar-sep"></div>
        <button id="btn-download-config">Download Config</button>
      </div>
    </div>

    <div id="app">
      <!-- Left Panel: Palette tabs -->
      <div class="panel" id="left-panel">
        <div class="panel-tabs">
          <button id="tab-tiles" class="active">Tiles</button>
          <button id="tab-buildings">Buildings</button>
        </div>
        <!-- Tile palette -->
        <div id="tile-palette-panel">
          <input
            type="text"
            id="palette-search"
            placeholder="Search tiles..."
          />
          <div id="palette-tabs"></div>
          <div id="palette-grid"></div>
        </div>
        <!-- Building palette -->
        <div id="building-palette-panel" style="display: none">
          <div id="building-palette" style="flex: 1; overflow-y: auto"></div>
        </div>
      </div>

      <!-- Center: Canvas -->
      <div id="center">
        <canvas id="map-canvas"></canvas>
      </div>

      <!-- Right Panel -->
      <div class="panel right" id="right-panel">
        <h3>Tools</h3>
        <div class="prop-group">
          <div id="tools-wrap">
            <button class="active" data-tool="paint">Paint Tile</button>
            <button data-tool="place">Place Building</button>
            <button data-tool="mine">Mine Entrance</button>
            <button data-tool="spawn">Player Spawn</button>
            <button data-tool="erase">Erase</button>
          </div>
        </div>
        <div class="prop-group">
          <label>Positions</label>
          <div style="font-size: 11px; color: var(--text2); line-height: 1.6">
            <div>Mine: <span id="pos-mine">—</span></div>
            <div>Spawn: <span id="pos-spawn">—</span></div>
          </div>
        </div>
        <div class="prop-group">
          <label>Selected Building</label>
          <div
            id="selected-building-info"
            style="font-size: 11px; color: var(--text2)"
          >
            None
          </div>
          <button
            id="btn-remove-placed"
            style="margin-top: 4px; font-size: 11px; display: none"
          >
            Remove
          </button>
        </div>
        <div class="prop-group">
          <label>Keyboard Shortcuts</label>
          <div style="font-size: 11px; color: var(--text2); line-height: 1.6">
            <div><b>Right-click</b> — Erase tile</div>
            <div><b>Click+drag</b> — Paint sweep</div>
            <div><b>Ctrl+Z</b> — Undo</div>
          </div>
        </div>
        <div class="prop-group">
          <label>Legend</label>
          <div style="font-size: 11px; line-height: 1.8">
            <div>
              <span
                style="
                  display: inline-block;
                  width: 12px;
                  height: 12px;
                  background: #2d4a1e;
                  border: 1px solid #444;
                  vertical-align: middle;
                "
              ></span>
              Grass
            </div>
            <div>
              <span
                style="
                  display: inline-block;
                  width: 12px;
                  height: 12px;
                  background: #8d6e3a;
                  border: 1px solid #444;
                  vertical-align: middle;
                "
              ></span>
              Sand/Path
            </div>
            <div>
              <span
                style="
                  display: inline-block;
                  width: 12px;
                  height: 12px;
                  background: #2a6fa8;
                  border: 1px solid #444;
                  vertical-align: middle;
                "
              ></span>
              Water
            </div>
            <div>
              <span
                style="
                  display: inline-block;
                  width: 12px;
                  height: 12px;
                  background: #1a4a7a;
                  border: 1px solid #444;
                  vertical-align: middle;
                "
              ></span>
              Deep Water
            </div>
            <div>
              <span
                style="
                  display: inline-block;
                  width: 12px;
                  height: 12px;
                  background: #2d6b2d;
                  border: 1px solid #444;
                  vertical-align: middle;
                "
              ></span>
              Trees/Plants
            </div>
            <div>
              <span
                style="
                  display: inline-block;
                  width: 12px;
                  height: 12px;
                  background: #888;
                  border: 1px solid #444;
                  vertical-align: middle;
                "
              ></span>
              Walls/Vaults
            </div>
            <div>
              <span
                style="
                  display: inline-block;
                  width: 12px;
                  height: 12px;
                  background: #6a4a2a;
                  border: 1px solid #444;
                  vertical-align: middle;
                "
              ></span>
              Doors
            </div>
            <div>
              <span
                style="
                  display: inline-block;
                  width: 12px;
                  height: 12px;
                  background: #d4a840;
                  border: 1px solid #444;
                  vertical-align: middle;
                "
              ></span>
              Decor/Statues
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="statusbar">
      <span id="status-msg">Ready</span>
      <span id="status-pos"></span>
    </div>

    <script>
      (function () {
        "use strict";

        /* ── Config ── */
        const TOWN_W = 45,
          TOWN_H = 60;
        let cellSize = 16;

        /* ── State ── */
        let tileSprites = [];
        let allBuildings = [];
        let grid = []; // [y][x] = sprite className or null (null = grass)
        let placedBuildings = []; // [{templateId, x, y}]
        let minePos = null,
          spawnPos = null;
        let activeTool = "paint";
        let selectedTile = null;
        let selectedBuildingTemplate = null;
        let selectedPlacedIdx = -1;
        let painting = false;
        let undoStack = [];
        const MAX_UNDO = 30;
        let leftTab = "tiles"; // 'tiles' | 'buildings'

        /* ── DOM ── */
        const $ = (s) => document.querySelector(s);
        const canvas = $("#map-canvas");
        const ctx = canvas.getContext("2d");

        /* ── Tile categories ── */
        const categories = [
          { key: "All", folders: null },
          {
            key: "Grass",
            folders: ["floor"],
            filter: (s) => s.startsWith("floor-grass"),
          },
          {
            key: "Sand/Path",
            folders: ["floor"],
            filter: (s) =>
              s.includes("sand") || s.includes("pebble") || s.includes("dirt"),
          },
          { key: "Floors", folders: ["floor"] },
          { key: "Water", folders: ["water"] },
          { key: "Trees", folders: ["trees"] },
          { key: "Plants", folders: ["plants"] },
          { key: "Walls", folders: ["wall", "vaults"] },
          {
            key: "Decor",
            folders: ["decor", "altars", "statues", "shops", "traps"],
          },
          { key: "Doors", folders: ["doors"] },
          { key: "Gateways", folders: ["gateways"] },
        ];
        let activeCategory = "All";

        /* ── Color map for canvas ── */
        function spriteColor(cls) {
          if (!cls) return "#2d4a1e"; // grass
          if (cls.startsWith("floor-grass")) return "#3a6a28";
          if (
            cls.startsWith("floor-sand") ||
            cls.startsWith("floor-pebble") ||
            cls.startsWith("floor-dirt")
          )
            return "#8d6e3a";
          if (cls.startsWith("floor-acidic")) return "#5a8a2a";
          if (cls.startsWith("floor-ice") || cls.startsWith("floor-frozen"))
            return "#8ab8d8";
          if (cls.startsWith("floor-")) return "#6a5a3a";
          if (cls.startsWith("water-deep")) return "#1a4a7a";
          if (cls.startsWith("water-")) return "#2a6fa8";
          if (cls.startsWith("trees-") || cls.startsWith("plants-"))
            return "#2d6b2d";
          if (cls.startsWith("wall-") || cls.startsWith("vaults-"))
            return "#888";
          if (cls.startsWith("doors-")) return "#6a4a2a";
          if (cls.startsWith("statues-")) return "#999";
          if (cls.startsWith("altars-")) return "#9a6ad4";
          if (cls.startsWith("shops-")) return "#d4a840";
          if (cls.startsWith("traps-")) return "#d44040";
          if (cls.startsWith("gateways-")) return "#40a0d4";
          if (cls.startsWith("decor-")) return "#d4a840";
          return "#555";
        }

        /* ── Init ── */
        async function init() {
          // Init empty grid
          for (let y = 0; y < TOWN_H; y++) {
            grid[y] = [];
            for (let x = 0; x < TOWN_W; x++) grid[y][x] = null;
          }

          // Load manifest
          try {
            let r = await fetch("../sprites-manifest.json");
            let m = await r.json();
            tileSprites = m.tiles.sprites;
          } catch (e) {
            status("Failed to load sprites manifest");
            return;
          }

          // Load buildings
          try {
            let r = await fetch("../town-buildings.json");
            allBuildings = await r.json();
          } catch (e) {
            allBuildings = [];
          }

          // Load existing config
          await loadConfig();

          buildTilePalette();
          buildCategoryTabs();
          buildBuildingPalette();
          loadAutoSave();
          sizeCanvas();
          render();
          wireEvents();
          updatePositions();
          status(
            "Ready — " +
              tileSprites.length +
              " tiles, " +
              allBuildings.length +
              " buildings",
          );
        }

        async function loadConfig() {
          try {
            let r = await fetch("../town-config.json");
            let cfg = await r.json();
            // Import water
            if (cfg.water)
              for (let w of cfg.water) {
                if (w.x >= 0 && w.x < TOWN_W && w.y >= 0 && w.y < TOWN_H)
                  grid[w.y][w.x] = "water-shallow_water";
              }
            // Import trees
            if (cfg.trees)
              for (let t of cfg.trees) {
                if (t.x >= 0 && t.x < TOWN_W && t.y >= 0 && t.y < TOWN_H)
                  grid[t.y][t.x] = "trees-tree1";
              }
            // Import paths
            if (cfg.paths)
              for (let p of cfg.paths) {
                if (p.points) {
                  for (let pt of p.points) {
                    if (
                      pt[0] >= 0 &&
                      pt[0] < TOWN_W &&
                      pt[1] >= 0 &&
                      pt[1] < TOWN_H
                    )
                      grid[pt[1]][pt[0]] = "floor-sand5";
                  }
                } else if (p.x !== undefined) {
                  if (p.x >= 0 && p.x < TOWN_W && p.y >= 0 && p.y < TOWN_H)
                    grid[p.y][p.x] = "floor-sand5";
                }
              }
            // Import painted tiles (new format)
            if (cfg.tiles)
              for (let t of cfg.tiles) {
                if (t.x >= 0 && t.x < TOWN_W && t.y >= 0 && t.y < TOWN_H)
                  grid[t.y][t.x] = t.sprite;
              }
            // Positions
            if (cfg.mineEntrance) minePos = cfg.mineEntrance;
            if (cfg.playerSpawn) spawnPos = cfg.playerSpawn;
            // Buildings
            if (cfg.buildings)
              placedBuildings = cfg.buildings.map((b) => ({
                templateId: b.templateId || b.id,
                x: b.x,
                y: b.y,
              }));
            status("Loaded town config");
          } catch (e) {
            status("No config found, starting blank");
          }
        }

        /* ── Canvas ── */
        function sizeCanvas() {
          canvas.width = TOWN_W * cellSize;
          canvas.height = TOWN_H * cellSize;
          canvas.style.imageRendering = "pixelated";
        }

        function render() {
          let w = TOWN_W,
            h = TOWN_H,
            cs = cellSize;
          ctx.clearRect(0, 0, canvas.width, canvas.height);

          // Draw grid cells
          for (let y = 0; y < h; y++) {
            for (let x = 0; x < w; x++) {
              let s = grid[y][x];
              ctx.fillStyle = spriteColor(s);
              ctx.fillRect(x * cs, y * cs, cs, cs);
              // Tree dot
              if (s && (s.startsWith("trees-") || s.startsWith("plants-"))) {
                ctx.fillStyle = "#1a3a12";
                let r = Math.max(2, cs / 6);
                ctx.beginPath();
                ctx.arc(x * cs + cs / 2, y * cs + cs / 2, r, 0, Math.PI * 2);
                ctx.fill();
              }
            }
          }

          // Grid lines (subtle)
          ctx.strokeStyle = "rgba(255,255,255,0.04)";
          ctx.lineWidth = 0.5;
          for (let x = 0; x <= w; x++) {
            ctx.beginPath();
            ctx.moveTo(x * cs, 0);
            ctx.lineTo(x * cs, h * cs);
            ctx.stroke();
          }
          for (let y = 0; y <= h; y++) {
            ctx.beginPath();
            ctx.moveTo(0, y * cs);
            ctx.lineTo(w * cs, y * cs);
            ctx.stroke();
          }

          // Placed buildings
          placedBuildings.forEach((p, i) => {
            let tmpl = allBuildings.find((b) => b.id === p.templateId);
            if (!tmpl) return;
            let bx = p.x * cs,
              by = p.y * cs,
              bw = tmpl.width * cs,
              bh = tmpl.height * cs;
            ctx.fillStyle =
              i === selectedPlacedIdx
                ? "rgba(201,168,76,0.35)"
                : "rgba(201,168,76,0.15)";
            ctx.fillRect(bx, by, bw, bh);
            ctx.strokeStyle = i === selectedPlacedIdx ? "#e0c068" : "#c9a84c";
            ctx.lineWidth = i === selectedPlacedIdx ? 2.5 : 1.5;
            ctx.strokeRect(bx + 0.5, by + 0.5, bw - 1, bh - 1);
            // Label
            ctx.fillStyle = "#c9a84c";
            ctx.font = (cs < 24 ? "9" : "11") + "px sans-serif";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            let name =
              tmpl.name.length > 14 ? tmpl.name.slice(0, 12) + ".." : tmpl.name;
            ctx.fillText(name, bx + bw / 2, by + bh / 2);
          });

          // Mine entrance
          if (minePos) {
            ctx.fillStyle = "rgba(231,76,60,0.6)";
            ctx.fillRect(minePos.x * cs, minePos.y * cs, cs, cs);
            ctx.fillStyle = "#fff";
            ctx.font = "bold " + (cs < 24 ? "8" : "11") + "px sans-serif";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText("M", minePos.x * cs + cs / 2, minePos.y * cs + cs / 2);
          }

          // Player spawn
          if (spawnPos) {
            ctx.fillStyle = "rgba(76,175,80,0.6)";
            ctx.fillRect(spawnPos.x * cs, spawnPos.y * cs, cs, cs);
            ctx.fillStyle = "#fff";
            ctx.font = "bold " + (cs < 24 ? "8" : "11") + "px sans-serif";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(
              "P",
              spawnPos.x * cs + cs / 2,
              spawnPos.y * cs + cs / 2,
            );
          }
        }

        /* ── Tile Palette ── */
        function buildCategoryTabs() {
          let tabs = $("#palette-tabs");
          tabs.textContent = "";
          categories.forEach((c) => {
            let b = document.createElement("button");
            b.textContent = c.key;
            if (c.key === activeCategory) b.classList.add("active");
            b.addEventListener("click", () => {
              activeCategory = c.key;
              tabs
                .querySelectorAll("button")
                .forEach((x) => x.classList.remove("active"));
              b.classList.add("active");
              filterPalette();
            });
            tabs.appendChild(b);
          });
        }

        function buildTilePalette() {
          let pg = $("#palette-grid");
          pg.textContent = "";
          tileSprites.forEach((s) => {
            let d = document.createElement("div");
            d.className = "palette-tile";
            d.dataset.name = s.className;
            d.dataset.folder = s.subfolder;
            d.title = s.className;
            let t = document.createElement("div");
            t.className = "tile " + s.className;
            d.appendChild(t);
            d.addEventListener("click", () => {
              pg.querySelectorAll(".palette-tile").forEach((x) =>
                x.classList.remove("selected"),
              );
              if (selectedTile === s.className) {
                selectedTile = null;
                return;
              }
              selectedTile = s.className;
              d.classList.add("selected");
              // Switch to paint tool
              setTool("paint");
              status("Tile: " + s.className);
            });
            pg.appendChild(d);
          });
          filterPalette();
        }

        function filterPalette() {
          let search = $("#palette-search").value.toLowerCase();
          let cat = categories.find((c) => c.key === activeCategory);
          let folders = cat ? cat.folders : null;
          let filter = cat ? cat.filter : null;
          $("#palette-grid")
            .querySelectorAll(".palette-tile")
            .forEach((el) => {
              let name = el.dataset.name.toLowerCase();
              let folder = el.dataset.folder;
              let showCat = !folders || folders.includes(folder);
              let showFilter = !filter || filter(el.dataset.name);
              let showSearch = !search || name.includes(search);
              // If filter is set but folders match, we further apply the filter
              if (folders && filter)
                showCat = folders.includes(folder) && filter(el.dataset.name);
              else if (folders) showCat = folders.includes(folder);
              el.style.display = showCat && showSearch ? "" : "none";
            });
        }

        /* ── Building Palette ── */
        function buildBuildingPalette() {
          let pal = $("#building-palette");
          pal.textContent = "";
          allBuildings.forEach((b) => {
            let d = document.createElement("div");
            d.className = "building-thumb";
            let n = document.createElement("span");
            n.className = "building-thumb-name";
            n.textContent = b.name;
            let s = document.createElement("span");
            s.className = "building-thumb-size";
            s.textContent = b.width + "x" + b.height;
            d.appendChild(n);
            d.appendChild(s);
            d.addEventListener("click", () => {
              selectedBuildingTemplate = b;
              pal
                .querySelectorAll(".building-thumb")
                .forEach((x) => x.classList.remove("selected"));
              d.classList.add("selected");
              setTool("place");
              status("Place: " + b.name);
            });
            pal.appendChild(d);
          });
        }

        /* ── Tools ── */
        function setTool(t) {
          activeTool = t;
          document.querySelectorAll("#tools-wrap button").forEach((b) => {
            b.classList.toggle("active", b.dataset.tool === t);
          });
          selectedPlacedIdx = -1;
          updateSelection();
        }

        /* ── Undo ── */
        function pushUndo() {
          // Store grid + buildings + positions
          undoStack.push({
            grid: grid.map((r) => [...r]),
            buildings: JSON.parse(JSON.stringify(placedBuildings)),
            mine: minePos ? { ...minePos } : null,
            spawn: spawnPos ? { ...spawnPos } : null,
          });
          if (undoStack.length > MAX_UNDO) undoStack.shift();
        }

        function undo() {
          if (!undoStack.length) return;
          let s = undoStack.pop();
          grid = s.grid;
          placedBuildings = s.buildings;
          minePos = s.mine;
          spawnPos = s.spawn;
          render();
          updatePositions();
          autoSave();
        }

        /* ── Canvas interaction ── */
        function canvasToGrid(e) {
          let rect = canvas.getBoundingClientRect();
          let sx = (e.clientX - rect.left) * (canvas.width / rect.width);
          let sy = (e.clientY - rect.top) * (canvas.height / rect.height);
          let gx = Math.floor(sx / cellSize);
          let gy = Math.floor(sy / cellSize);
          return {
            x: Math.max(0, Math.min(TOWN_W - 1, gx)),
            y: Math.max(0, Math.min(TOWN_H - 1, gy)),
          };
        }

        function onCanvasDown(e) {
          e.preventDefault();
          let { x, y } = canvasToGrid(e);

          // Right-click = erase
          if (e.button === 2) {
            pushUndo();
            painting = true;
            grid[y][x] = null;
            renderCell(x, y);
            autoSave();
            return;
          }

          if (activeTool === "paint") {
            if (!selectedTile) {
              status("Select a tile first");
              return;
            }
            pushUndo();
            painting = true;
            grid[y][x] = selectedTile;
            renderCell(x, y);
          } else if (activeTool === "erase") {
            pushUndo();
            painting = true;
            grid[y][x] = null;
            renderCell(x, y);
          } else if (activeTool === "place") {
            if (!selectedBuildingTemplate) {
              status("Select a building first");
              return;
            }
            pushUndo();
            placedBuildings.push({
              templateId: selectedBuildingTemplate.id,
              x,
              y,
            });
            render();
            autoSave();
            status("Placed: " + selectedBuildingTemplate.name);
          } else if (activeTool === "mine") {
            pushUndo();
            minePos = { x, y };
            render();
            updatePositions();
            autoSave();
          } else if (activeTool === "spawn") {
            pushUndo();
            spawnPos = { x, y };
            render();
            updatePositions();
            autoSave();
          }

          // Check if clicked on a building (for selection)
          if (activeTool === "place" || activeTool === "paint") {
            let idx = findBuildingAt(x, y);
            if (idx >= 0 && activeTool !== "paint") {
              selectedPlacedIdx = idx;
              render();
              updateSelection();
            }
          }
        }

        function onCanvasMove(e) {
          let { x, y } = canvasToGrid(e);
          $("#status-pos").textContent = `(${x}, ${y})`;
          if (!painting) return;
          if (activeTool === "paint" && selectedTile) {
            grid[y][x] = selectedTile;
            renderCell(x, y);
          } else if (activeTool === "erase" || e.buttons === 2) {
            grid[y][x] = null;
            renderCell(x, y);
          }
        }

        function onCanvasUp() {
          if (painting) {
            painting = false;
            autoSave();
          }
        }

        function renderCell(x, y) {
          let cs = cellSize;
          ctx.fillStyle = spriteColor(grid[y][x]);
          ctx.fillRect(x * cs, y * cs, cs, cs);
          let s = grid[y][x];
          if (s && (s.startsWith("trees-") || s.startsWith("plants-"))) {
            ctx.fillStyle = "#1a3a12";
            let r = Math.max(2, cs / 6);
            ctx.beginPath();
            ctx.arc(x * cs + cs / 2, y * cs + cs / 2, r, 0, Math.PI * 2);
            ctx.fill();
          }
          // Subtle grid
          ctx.strokeStyle = "rgba(255,255,255,0.04)";
          ctx.lineWidth = 0.5;
          ctx.strokeRect(x * cs, y * cs, cs, cs);
        }

        function findBuildingAt(gx, gy) {
          for (let i = placedBuildings.length - 1; i >= 0; i--) {
            let p = placedBuildings[i];
            let tmpl = allBuildings.find((b) => b.id === p.templateId);
            if (!tmpl) continue;
            if (
              gx >= p.x &&
              gx < p.x + tmpl.width &&
              gy >= p.y &&
              gy < p.y + tmpl.height
            )
              return i;
          }
          return -1;
        }

        /* ── UI updates ── */
        function updatePositions() {
          $("#pos-mine").textContent = minePos
            ? `(${minePos.x}, ${minePos.y})`
            : "—";
          $("#pos-spawn").textContent = spawnPos
            ? `(${spawnPos.x}, ${spawnPos.y})`
            : "—";
        }

        function updateSelection() {
          let info = $("#selected-building-info");
          let btn = $("#btn-remove-placed");
          if (selectedPlacedIdx >= 0 && placedBuildings[selectedPlacedIdx]) {
            let p = placedBuildings[selectedPlacedIdx];
            let tmpl = allBuildings.find((b) => b.id === p.templateId);
            info.textContent =
              (tmpl ? tmpl.name : p.templateId) +
              " at (" +
              p.x +
              "," +
              p.y +
              ")";
            btn.style.display = "";
          } else {
            info.textContent = "None";
            btn.style.display = "none";
          }
        }

        /* ── Export ── */
        function downloadConfig() {
          let tiles = [];
          for (let y = 0; y < TOWN_H; y++) {
            for (let x = 0; x < TOWN_W; x++) {
              if (grid[y][x]) tiles.push({ x, y, sprite: grid[y][x] });
            }
          }
          // Also export legacy arrays for backward compatibility
          let water = [],
            trees = [],
            paths = [];
          for (let t of tiles) {
            if (t.sprite.startsWith("water-")) water.push({ x: t.x, y: t.y });
            else if (
              t.sprite.startsWith("trees-") ||
              t.sprite.startsWith("plants-")
            )
              trees.push({ x: t.x, y: t.y });
            else if (
              t.sprite.startsWith("floor-sand") ||
              t.sprite.startsWith("floor-pebble") ||
              t.sprite.startsWith("floor-dirt")
            )
              paths.push({ x: t.x, y: t.y });
          }
          let config = {
            width: TOWN_W,
            height: TOWN_H,
            buildings: placedBuildings.map((p) => ({
              templateId: p.templateId,
              x: p.x,
              y: p.y,
            })),
            tiles,
            water,
            trees,
            paths,
            mineEntrance: minePos,
            playerSpawn: spawnPos,
          };
          let blob = new Blob([JSON.stringify(config, null, 2)], {
            type: "application/json",
          });
          let a = document.createElement("a");
          a.href = URL.createObjectURL(blob);
          a.download = "town-config.json";
          a.click();
          URL.revokeObjectURL(a.href);
          status(
            "Downloaded town-config.json (" +
              tiles.length +
              " tiles, " +
              placedBuildings.length +
              " buildings)",
          );
        }

        /* ── Auto-save ── */
        function autoSave() {
          try {
            // Compress grid: only store non-null cells
            let tiles = [];
            for (let y = 0; y < TOWN_H; y++) {
              for (let x = 0; x < TOWN_W; x++) {
                if (grid[y][x]) tiles.push({ x, y, s: grid[y][x] });
              }
            }
            localStorage.setItem(
              "tb2-state",
              JSON.stringify({
                tiles,
                buildings: placedBuildings,
                mine: minePos,
                spawn: spawnPos,
              }),
            );
          } catch (e) {}
        }

        function loadAutoSave() {
          try {
            let raw = localStorage.getItem("tb2-state");
            if (!raw) return;
            let s = JSON.parse(raw);
            // Only load if we don't already have data from config
            let hasData = false;
            for (let y = 0; y < TOWN_H && !hasData; y++) {
              for (let x = 0; x < TOWN_W && !hasData; x++) {
                if (grid[y][x]) hasData = true;
              }
            }
            if (hasData) return; // config took priority
            if (s.tiles) {
              for (let t of s.tiles) {
                if (t.x >= 0 && t.x < TOWN_W && t.y >= 0 && t.y < TOWN_H)
                  grid[t.y][t.x] = t.s;
              }
            }
            if (s.buildings) placedBuildings = s.buildings;
            if (s.mine) minePos = s.mine;
            if (s.spawn) spawnPos = s.spawn;
          } catch (e) {}
        }

        function status(msg) {
          $("#status-msg").textContent = msg;
        }

        /* ── Events ── */
        function wireEvents() {
          // Canvas
          canvas.addEventListener("mousedown", onCanvasDown);
          canvas.addEventListener("mousemove", onCanvasMove);
          canvas.addEventListener("contextmenu", (e) => e.preventDefault());
          document.addEventListener("mouseup", onCanvasUp);

          // Keyboard
          document.addEventListener("keydown", (e) => {
            if (e.ctrlKey && e.key === "z") {
              e.preventDefault();
              undo();
            }
          });

          // Palette search
          $("#palette-search").addEventListener("input", filterPalette);

          // Tools
          document.querySelectorAll("#tools-wrap button").forEach((b) => {
            b.addEventListener("click", () => setTool(b.dataset.tool));
          });

          // Remove building
          $("#btn-remove-placed").addEventListener("click", () => {
            if (selectedPlacedIdx >= 0) {
              pushUndo();
              placedBuildings.splice(selectedPlacedIdx, 1);
              selectedPlacedIdx = -1;
              render();
              updateSelection();
              autoSave();
            }
          });

          // Zoom
          $("#btn-zoom").addEventListener("click", () => {
            cellSize = cellSize === 16 ? 32 : 16;
            $("#btn-zoom").textContent = "Zoom: " + cellSize + "px";
            sizeCanvas();
            render();
          });

          // Download
          $("#btn-download-config").addEventListener("click", downloadConfig);

          // Left panel tabs
          $("#tab-tiles").addEventListener("click", () => {
            leftTab = "tiles";
            $("#tab-tiles").classList.add("active");
            $("#tab-buildings").classList.remove("active");
            $("#tile-palette-panel").style.display = "";
            $("#building-palette-panel").style.display = "none";
          });
          $("#tab-buildings").addEventListener("click", () => {
            leftTab = "buildings";
            $("#tab-buildings").classList.add("active");
            $("#tab-tiles").classList.remove("active");
            $("#tile-palette-panel").style.display = "none";
            $("#building-palette-panel").style.display = "";
          });
        }

        init();
      })();
    </script>
  </body>
</html>
