<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Town Builder — The Runed Deep</title>
    <link rel="stylesheet" href="../css/sprites/tiles.css" />
    <link rel="stylesheet" href="../css/sprites/monsters.css" />
    <link rel="stylesheet" href="../css/sprites/items.css" />
    <link rel="stylesheet" href="../css/sprites/effects.css" />
    <link rel="stylesheet" href="../css/sprites/player.css" />
    <link rel="stylesheet" href="../css/sprites/buildings.css" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      :root {
        --bg: #1a1a1a;
        --bg2: #222;
        --bg3: #2a2a2a;
        --gold: #c9a84c;
        --gold2: #e0c068;
        --border: #444;
        --text: #ddd;
        --text2: #999;
        --green: #4caf50;
        --orange: #ff9800;
        --red: #e74c3c;
        --panel: 260px;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: "Segoe UI", system-ui, sans-serif;
        font-size: 14px;
        overflow: hidden;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }
      button {
        background: var(--bg3);
        color: var(--text);
        border: 1px solid var(--border);
        padding: 4px 12px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 13px;
      }
      button:hover {
        border-color: var(--gold);
        color: var(--gold);
      }
      button.active {
        background: var(--gold);
        color: #111;
        border-color: var(--gold2);
      }
      input,
      select {
        background: var(--bg3);
        color: var(--text);
        border: 1px solid var(--border);
        padding: 4px 8px;
        border-radius: 4px;
        font-size: 13px;
      }
      input:focus,
      select:focus {
        outline: none;
        border-color: var(--gold);
      }
      label {
        color: var(--text2);
        font-size: 12px;
      }

      #topbar {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 12px;
        background: var(--bg2);
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
        flex-wrap: wrap;
      }
      #topbar h1 {
        font-size: 16px;
        color: var(--gold);
        margin-right: 12px;
        white-space: nowrap;
      }
      .topbar-group {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .topbar-sep {
        width: 1px;
        height: 24px;
        background: var(--border);
        margin: 0 4px;
      }

      #app {
        display: flex;
        flex: 1;
        overflow: hidden;
      }
      .panel {
        width: var(--panel);
        background: var(--bg2);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        flex-shrink: 0;
      }
      .panel.right {
        border-right: none;
        border-left: 1px solid var(--border);
      }
      .panel h3 {
        padding: 8px 10px;
        font-size: 13px;
        color: var(--gold);
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
      }
      #center {
        flex: 1;
        overflow: auto;
        position: relative;
        cursor: crosshair;
      }

      /* Map container (DOM-based rendering) */
      #map {
        position: relative;
        background: #2d4a1e;
        image-rendering: pixelated;
      }
      #map .cell {
        position: absolute;
        overflow: hidden;
      }
      #map .cell .tile {
        display: block;
        width: 32px;
        height: 32px;
      }
      #map.show-grid .cell {
        outline: 1px solid rgba(255, 255, 255, 0.12);
      }

      /* Building overlays */
      .building-overlay {
        position: absolute;
        border: 1.5px solid #c9a84c;
        background: rgba(201, 168, 76, 0.15);
        z-index: 10;
        pointer-events: none;
      }
      .building-overlay.selected {
        border-width: 2.5px;
        border-color: #e0c068;
        background: rgba(201, 168, 76, 0.35);
      }
      .building-label {
        position: absolute;
        z-index: 20;
        background: #000c;
        color: #c9a84c;
        font-size: 10px;
        padding: 1px 4px;
        white-space: nowrap;
        pointer-events: none;
        border: 1px solid #555;
        border-radius: 2px;
        transform: translate(-50%, -100%);
        margin-top: -2px;
      }

      /* Marker overlays */
      .marker-overlay {
        position: absolute;
        z-index: 15;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        color: #fff;
        font-size: 11px;
        pointer-events: none;
      }
      .marker-mine {
        background: rgba(231, 76, 60, 0.6);
      }
      .marker-spawn {
        background: rgba(76, 175, 80, 0.6);
      }

      /* Hover preview */
      #hover-preview {
        position: absolute;
        z-index: 30;
        pointer-events: none;
        opacity: 0.5;
        display: none;
      }
      #hover-preview .tile {
        display: block;
        width: 32px;
        height: 32px;
      }

      /* Tile palette */
      #palette-search {
        margin: 6px 8px;
        width: calc(100% - 16px);
      }
      #palette-tabs {
        display: flex;
        flex-wrap: wrap;
        gap: 2px;
        padding: 4px 6px;
        flex-shrink: 0;
      }
      #palette-tabs button {
        padding: 2px 6px;
        font-size: 11px;
        border-radius: 3px;
      }
      #palette-grid {
        flex: 1;
        overflow-y: auto;
        padding: 6px;
        display: flex;
        flex-wrap: wrap;
        gap: 2px;
        align-content: flex-start;
      }
      .palette-tile {
        width: 34px;
        height: 34px;
        border: 1px solid transparent;
        border-radius: 2px;
        cursor: pointer;
        position: relative;
        flex-shrink: 0;
      }
      .palette-tile:hover {
        border-color: var(--gold);
      }
      .palette-tile.selected {
        border-color: var(--gold);
        box-shadow: 0 0 6px var(--gold);
      }
      .palette-tile .tile {
        display: block;
      }
      .palette-tile[title]:hover::after {
        content: attr(title);
        position: absolute;
        bottom: -20px;
        left: 0;
        background: #000;
        color: #fff;
        font-size: 10px;
        padding: 1px 4px;
        border-radius: 2px;
        white-space: nowrap;
        z-index: 10;
        pointer-events: none;
      }

      /* Building palette */
      .building-thumb {
        padding: 6px 8px;
        cursor: pointer;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .building-thumb:hover {
        background: var(--bg3);
      }
      .building-thumb.selected {
        background: var(--gold);
        color: #111;
      }
      .building-thumb-name {
        font-size: 12px;
      }
      .building-thumb-size {
        font-size: 10px;
        color: var(--text2);
      }

      /* Right panel tools */
      #tools-wrap {
        display: flex;
        flex-wrap: wrap;
        gap: 3px;
        padding: 6px 8px;
      }
      #tools-wrap button {
        font-size: 11px;
        padding: 3px 7px;
      }
      .prop-group {
        padding: 8px 10px;
        border-bottom: 1px solid var(--border);
      }
      .prop-group label {
        display: block;
        margin-bottom: 2px;
      }

      /* Tab bar for left panel */
      .panel-tabs {
        display: flex;
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
      }
      .panel-tabs button {
        flex: 1;
        padding: 6px 4px;
        font-size: 12px;
        border: none;
        border-bottom: 2px solid transparent;
        border-radius: 0;
        background: transparent;
        color: var(--text2);
      }
      .panel-tabs button:hover {
        color: var(--text);
      }
      .panel-tabs button.active {
        color: var(--gold);
        border-bottom-color: var(--gold);
        background: transparent;
      }

      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: var(--bg);
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--gold);
      }

      #statusbar {
        padding: 4px 12px;
        background: var(--bg2);
        border-top: 1px solid var(--border);
        font-size: 11px;
        color: var(--text2);
        flex-shrink: 0;
        display: flex;
        gap: 16px;
      }

      /* Toast notification */
      .toast {
        position: fixed;
        bottom: 40px;
        left: 50%;
        transform: translateX(-50%);
        background: var(--gold);
        color: #111;
        padding: 8px 20px;
        border-radius: 4px;
        font-size: 13px;
        font-weight: bold;
        z-index: 1000;
        opacity: 0;
        transition: opacity 0.3s;
        pointer-events: none;
      }
      .toast.show {
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <div id="topbar">
      <h1>Town Builder</h1>
      <div class="topbar-group">
        <button id="btn-zoom">Zoom: 16px</button>
        <div class="topbar-sep"></div>
        <label
          style="
            color: var(--text2);
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
          "
        >
          <input type="checkbox" id="chk-grid" /> Grid
        </label>
        <label
          style="
            color: var(--text2);
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
          "
        >
          <input type="checkbox" id="chk-labels" checked /> Labels
        </label>
        <div class="topbar-sep"></div>
        <button id="btn-save">Save Progress</button>
        <button id="btn-download-config">Download Config</button>
        <button id="btn-load-file">Load from File</button>
        <button id="btn-reset">Reset</button>
        <input
          type="file"
          id="file-input"
          accept=".json"
          style="display: none"
        />
      </div>
    </div>

    <div id="app">
      <!-- Left Panel: Palette tabs -->
      <div class="panel" id="left-panel">
        <div class="panel-tabs">
          <button id="tab-tiles" class="active">Tiles</button>
          <button id="tab-buildings">Buildings</button>
        </div>
        <!-- Tile palette -->
        <div id="tile-palette-panel">
          <input
            type="text"
            id="palette-search"
            placeholder="Search tiles..."
          />
          <div id="palette-tabs"></div>
          <div id="palette-grid"></div>
        </div>
        <!-- Building palette -->
        <div id="building-palette-panel" style="display: none">
          <div id="building-palette" style="flex: 1; overflow-y: auto"></div>
        </div>
      </div>

      <!-- Center: DOM-based map -->
      <div id="center">
        <div id="map"></div>
        <div id="hover-preview"><div class="tile"></div></div>
      </div>

      <!-- Right Panel -->
      <div class="panel right" id="right-panel">
        <h3>Tools</h3>
        <div class="prop-group">
          <div id="tools-wrap">
            <button class="active" data-tool="paint">Paint Tile</button>
            <button data-tool="place">Place Building</button>
            <button data-tool="mine">Mine Entrance</button>
            <button data-tool="spawn">Player Spawn</button>
            <button data-tool="erase">Erase</button>
          </div>
        </div>
        <div class="prop-group">
          <label>Positions</label>
          <div style="font-size: 11px; color: var(--text2); line-height: 1.6">
            <div>Mine: <span id="pos-mine">—</span></div>
            <div>Spawn: <span id="pos-spawn">—</span></div>
          </div>
        </div>
        <div class="prop-group">
          <label>Selected Building</label>
          <div
            id="selected-building-info"
            style="font-size: 11px; color: var(--text2)"
          >
            None
          </div>
          <button
            id="btn-remove-placed"
            style="margin-top: 4px; font-size: 11px; display: none"
          >
            Remove
          </button>
        </div>
        <div class="prop-group">
          <label>Selected Tile</label>
          <div
            id="selected-tile-preview"
            style="
              display: flex;
              align-items: center;
              gap: 8px;
              margin-top: 4px;
            "
          >
            <span style="font-size: 11px; color: var(--text2)">None</span>
          </div>
        </div>
        <div class="prop-group">
          <label>Keyboard Shortcuts</label>
          <div style="font-size: 11px; color: var(--text2); line-height: 1.6">
            <div><b>Right-click</b> — Erase tile</div>
            <div><b>Click+drag</b> — Paint sweep</div>
            <div><b>Ctrl+Z</b> — Undo</div>
          </div>
        </div>
      </div>
    </div>

    <div id="statusbar">
      <span id="status-msg">Ready</span>
      <span id="status-pos"></span>
    </div>
    <div id="toast" class="toast"></div>

    <script>
      (function () {
        "use strict";

        /* ── Config ── */
        const TOWN_W = 45,
          TOWN_H = 60,
          TILE = 32;
        let cellSize = 16;

        /* ── State ── */
        let tileSprites = [];
        let allBuildings = [];
        let grid = []; // [y][x] = sprite className or null (null = grass)
        let placedBuildings = []; // [{templateId, x, y}]
        let minePos = null,
          spawnPos = null;
        let activeTool = "paint";
        let selectedTile = null;
        let selectedBuildingTemplate = null;
        let selectedPlacedIdx = -1;
        let painting = false;
        let undoStack = [];
        const MAX_UNDO = 30;
        let leftTab = "tiles";
        let showGrid = false;
        let showLabels = true;

        /* ── DOM cache ── */
        const $ = (s) => document.querySelector(s);
        const mapEl = $("#map");
        // cellEls[y][x] = DOM element or null
        let cellEls = [];
        // Overlay elements
        let buildingOverlays = [];
        let labelOverlays = [];
        let markerEls = { mine: null, spawn: null };
        let hoverEl = $("#hover-preview");

        /* ── Tile categories ── */
        const categories = [
          { key: "All", folders: null },
          {
            key: "Grass",
            folders: ["floor"],
            filter: (s) => s.startsWith("floor-grass"),
          },
          {
            key: "Sand/Path",
            folders: ["floor"],
            filter: (s) =>
              s.includes("sand") || s.includes("pebble") || s.includes("dirt"),
          },
          { key: "Floors", folders: ["floor"] },
          { key: "Water", folders: ["water"] },
          { key: "Trees", folders: ["trees"] },
          { key: "Plants", folders: ["plants"] },
          { key: "Walls", folders: ["wall", "vaults"] },
          {
            key: "Decor",
            folders: ["decor", "altars", "statues", "shops", "traps"],
          },
          { key: "Doors", folders: ["doors"] },
          { key: "Gateways", folders: ["gateways"] },
        ];
        let activeCategory = "All";

        /* ── Init ── */
        async function init() {
          // Init empty grid + cellEls
          for (let y = 0; y < TOWN_H; y++) {
            grid[y] = [];
            cellEls[y] = [];
            for (let x = 0; x < TOWN_W; x++) {
              grid[y][x] = null;
              cellEls[y][x] = null;
            }
          }

          // Load manifest
          try {
            let r = await fetch("../sprites-manifest.json");
            let m = await r.json();
            tileSprites = m.tiles.sprites;
          } catch (e) {
            status("Failed to load sprites manifest");
            return;
          }

          // Load buildings
          try {
            let r = await fetch("../town-buildings.json");
            allBuildings = await r.json();
          } catch (e) {
            allBuildings = [];
          }

          // Load data: localStorage first, then config
          let loaded = loadAutoSave();
          if (!loaded) await loadConfig();

          buildTilePalette();
          buildCategoryTabs();
          buildBuildingPalette();
          renderFull();
          wireEvents();
          updatePositions();
          status(
            "Ready — " +
              tileSprites.length +
              " tiles, " +
              allBuildings.length +
              " buildings",
          );
        }

        async function loadConfig() {
          try {
            let r = await fetch("../town-config.json");
            let cfg = await r.json();
            if (cfg.water)
              for (let w of cfg.water)
                if (w.x >= 0 && w.x < TOWN_W && w.y >= 0 && w.y < TOWN_H)
                  grid[w.y][w.x] = "water-deep_water";
            if (cfg.trees)
              for (let t of cfg.trees)
                if (t.x >= 0 && t.x < TOWN_W && t.y >= 0 && t.y < TOWN_H)
                  grid[t.y][t.x] = t.sprite || "trees-tree1";
            if (cfg.decoration)
              for (let d of cfg.decoration)
                if (d.x >= 0 && d.x < TOWN_W && d.y >= 0 && d.y < TOWN_H)
                  grid[d.y][d.x] = d.sprite || "floor-grass_flowers0";
            if (cfg.features)
              for (let f of cfg.features) {
                let fw = f.w || 1,
                  fh = f.h || 1;
                for (let dy = 0; dy < fh; dy++)
                  for (let dx = 0; dx < fw; dx++) {
                    let fx = f.x + dx,
                      fy = f.y + dy;
                    if (fx >= 0 && fx < TOWN_W && fy >= 0 && fy < TOWN_H)
                      grid[fy][fx] = "decor-sparkling_fountain";
                  }
              }
            if (cfg.paths)
              for (let p of cfg.paths) {
                if (p.points) {
                  for (let pt of p.points)
                    if (
                      pt[0] >= 0 &&
                      pt[0] < TOWN_W &&
                      pt[1] >= 0 &&
                      pt[1] < TOWN_H
                    )
                      grid[pt[1]][pt[0]] = "floor-sand5";
                } else if (p.x !== undefined) {
                  if (p.x >= 0 && p.x < TOWN_W && p.y >= 0 && p.y < TOWN_H)
                    grid[p.y][p.x] = "floor-sand5";
                }
              }
            if (cfg.tiles)
              for (let t of cfg.tiles)
                if (t.x >= 0 && t.x < TOWN_W && t.y >= 0 && t.y < TOWN_H)
                  grid[t.y][t.x] = t.sprite;
            if (cfg.mineEntrance) minePos = cfg.mineEntrance;
            if (cfg.playerSpawn) spawnPos = cfg.playerSpawn;
            if (cfg.buildings)
              placedBuildings = cfg.buildings.map((b) => ({
                templateId: b.templateId || b.id,
                x: b.x,
                y: b.y,
              }));
            status("Loaded town config");
          } catch (e) {
            status("No config found, starting blank");
          }
        }

        /* ── DOM-based rendering ── */
        function renderFull() {
          let s = cellSize === 16 ? 0.5 : 1;
          let cp = TILE * s;
          mapEl.style.width = TOWN_W * cp + "px";
          mapEl.style.height = TOWN_H * cp + "px";

          // Clear everything
          while (mapEl.firstChild) mapEl.removeChild(mapEl.firstChild);

          let frag = document.createDocumentFragment();

          // Create all cells
          for (let y = 0; y < TOWN_H; y++) {
            for (let x = 0; x < TOWN_W; x++) {
              let sprite = grid[y][x];
              let cell = document.createElement("div");
              cell.className = "cell";
              cell.style.cssText =
                "left:" +
                x * cp +
                "px;top:" +
                y * cp +
                "px;width:" +
                cp +
                "px;height:" +
                cp +
                "px;";
              let t = document.createElement("div");
              t.className = "tile " + (sprite || "floor-grass0");
              t.style.cssText =
                "transform:scale(" + s + ");transform-origin:top left;";
              cell.appendChild(t);
              frag.appendChild(cell);
              cellEls[y][x] = cell;
            }
          }

          mapEl.appendChild(frag);

          // Render overlays
          renderOverlays();
        }

        function renderCell(x, y) {
          let s = cellSize === 16 ? 0.5 : 1;
          let cell = cellEls[y][x];
          if (!cell) return;
          let t = cell.firstChild;
          let sprite = grid[y][x];
          t.className = "tile " + (sprite || "floor-grass0");
          t.style.cssText =
            "transform:scale(" + s + ");transform-origin:top left;";
        }

        function renderOverlays() {
          let s = cellSize === 16 ? 0.5 : 1;
          let cp = TILE * s;

          // Remove old overlays
          buildingOverlays.forEach((el) => el.remove());
          labelOverlays.forEach((el) => el.remove());
          // markerEls.mine handled via buildingOverlays cleanup
          if (markerEls.spawn) markerEls.spawn.remove();
          buildingOverlays = [];
          labelOverlays = [];
          markerEls = { mine: null, spawn: null };

          let tpl = {};
          for (let b of allBuildings) tpl[b.id] = b;

          // Building overlays + labels
          placedBuildings.forEach((p, i) => {
            let tmpl = tpl[p.templateId];
            if (!tmpl) return;
            let bx = p.x * cp,
              by = p.y * cp,
              bw = tmpl.width * cp,
              bh = tmpl.height * cp;

            let ov = document.createElement("div");
            ov.className =
              "building-overlay" + (i === selectedPlacedIdx ? " selected" : "");
            ov.style.cssText =
              "left:" +
              bx +
              "px;top:" +
              by +
              "px;width:" +
              bw +
              "px;height:" +
              bh +
              "px;";
            mapEl.appendChild(ov);
            buildingOverlays.push(ov);

            // Entrance dot (green)
            if (tmpl.entrance) {
              let dot = document.createElement("div");
              dot.style.cssText =
                "position:absolute;width:" + Math.max(4, cp / 3) + "px;height:" + Math.max(4, cp / 3) + "px;" +
                "background:#4f4;border-radius:50%;z-index:12;pointer-events:none;" +
                "left:" + (bx + tmpl.entrance.x * cp + cp / 3) + "px;" +
                "top:" + (by + tmpl.entrance.y * cp + cp / 3) + "px;";
              dot.title = "Entrance";
              mapEl.appendChild(dot);
              buildingOverlays.push(dot);
            }

            if (showLabels) {
              let lbl = document.createElement("div");
              lbl.className = "building-label";
              lbl.textContent = tmpl.name;
              lbl.style.left = bx + bw / 2 + "px";
              lbl.style.top = by + "px";
              mapEl.appendChild(lbl);
              labelOverlays.push(lbl);
            }
          });

          // Mine markers (supports array)
          let mineArr = Array.isArray(minePos) ? minePos : (minePos ? [minePos] : []);
          for (let mp of mineArr) {
            let m = document.createElement("div");
            m.className = "marker-overlay marker-mine";
            m.style.cssText =
              "left:" + mp.x * cp + "px;top:" + mp.y * cp +
              "px;width:" + cp + "px;height:" + cp + "px;" +
              "font-size:" + (cp < 24 ? "8" : "11") + "px;";
            m.textContent = "M";
            mapEl.appendChild(m);
            buildingOverlays.push(m);
          }

          // Spawn marker
          if (spawnPos) {
            let m = document.createElement("div");
            m.className = "marker-overlay marker-spawn";
            m.style.cssText =
              "left:" +
              spawnPos.x * cp +
              "px;top:" +
              spawnPos.y * cp +
              "px;width:" +
              cp +
              "px;height:" +
              cp +
              "px;" +
              "font-size:" +
              (cp < 24 ? "8" : "11") +
              "px;";
            m.textContent = "P";
            mapEl.appendChild(m);
            markerEls.spawn = m;
          }
        }

        /* ── Tile Palette ── */
        function buildCategoryTabs() {
          let tabs = $("#palette-tabs");
          tabs.textContent = "";
          categories.forEach((c) => {
            let b = document.createElement("button");
            b.textContent = c.key;
            if (c.key === activeCategory) b.classList.add("active");
            b.addEventListener("click", () => {
              activeCategory = c.key;
              tabs
                .querySelectorAll("button")
                .forEach((x) => x.classList.remove("active"));
              b.classList.add("active");
              filterPalette();
            });
            tabs.appendChild(b);
          });
        }

        function buildTilePalette() {
          let pg = $("#palette-grid");
          pg.textContent = "";
          tileSprites.forEach((s) => {
            let d = document.createElement("div");
            d.className = "palette-tile";
            d.dataset.name = s.className;
            d.dataset.folder = s.subfolder;
            d.title = s.className;
            let t = document.createElement("div");
            t.className = "tile " + s.className;
            d.appendChild(t);
            d.addEventListener("click", () => {
              pg.querySelectorAll(".palette-tile").forEach((x) =>
                x.classList.remove("selected"),
              );
              if (selectedTile === s.className) {
                selectedTile = null;
                updateSelectedTilePreview();
                return;
              }
              selectedTile = s.className;
              d.classList.add("selected");
              setTool("paint");
              updateSelectedTilePreview();
              status("Tile: " + s.className);
            });
            pg.appendChild(d);
          });
          filterPalette();
        }

        function filterPalette() {
          let search = $("#palette-search").value.toLowerCase();
          let cat = categories.find((c) => c.key === activeCategory);
          let folders = cat ? cat.folders : null;
          let filter = cat ? cat.filter : null;
          $("#palette-grid")
            .querySelectorAll(".palette-tile")
            .forEach((el) => {
              let name = el.dataset.name.toLowerCase();
              let folder = el.dataset.folder;
              let showCat = !folders || folders.includes(folder);
              let showFilter = !filter || filter(el.dataset.name);
              let showSearch = !search || name.includes(search);
              if (folders && filter)
                showCat = folders.includes(folder) && filter(el.dataset.name);
              else if (folders) showCat = folders.includes(folder);
              el.style.display = showCat && showSearch ? "" : "none";
            });
        }

        function updateSelectedTilePreview() {
          let wrap = $("#selected-tile-preview");
          wrap.textContent = "";
          if (!selectedTile) {
            let sp = document.createElement("span");
            sp.style.cssText = "font-size:11px;color:var(--text2)";
            sp.textContent = "None";
            wrap.appendChild(sp);
            return;
          }
          let t = document.createElement("div");
          t.className = "tile " + selectedTile;
          t.style.cssText = "flex-shrink:0;";
          wrap.appendChild(t);
          let sp = document.createElement("span");
          sp.style.cssText =
            "font-size:11px;color:var(--text2);word-break:break-all";
          sp.textContent = selectedTile;
          wrap.appendChild(sp);
        }

        /* ── Building Palette ── */
        function buildBuildingPalette() {
          let pal = $("#building-palette");
          pal.textContent = "";
          allBuildings.forEach((b) => {
            let d = document.createElement("div");
            d.className = "building-thumb";
            let n = document.createElement("span");
            n.className = "building-thumb-name";
            n.textContent = b.name;
            let s = document.createElement("span");
            s.className = "building-thumb-size";
            s.textContent = b.width + "x" + b.height;
            d.appendChild(n);
            d.appendChild(s);
            d.addEventListener("click", () => {
              selectedBuildingTemplate = b;
              pal
                .querySelectorAll(".building-thumb")
                .forEach((x) => x.classList.remove("selected"));
              d.classList.add("selected");
              setTool("place");
              status("Place: " + b.name);
            });
            pal.appendChild(d);
          });
        }

        /* ── Tools ── */
        function setTool(t) {
          activeTool = t;
          document.querySelectorAll("#tools-wrap button").forEach((b) => {
            b.classList.toggle("active", b.dataset.tool === t);
          });
          selectedPlacedIdx = -1;
          updateSelection();
        }

        /* ── Undo ── */
        function pushUndo() {
          undoStack.push({
            grid: grid.map((r) => [...r]),
            buildings: JSON.parse(JSON.stringify(placedBuildings)),
            mine: minePos ? { ...minePos } : null,
            spawn: spawnPos ? { ...spawnPos } : null,
          });
          if (undoStack.length > MAX_UNDO) undoStack.shift();
        }

        function undo() {
          if (!undoStack.length) return;
          let s = undoStack.pop();
          grid = s.grid;
          placedBuildings = s.buildings;
          minePos = s.mine;
          spawnPos = s.spawn;
          renderFull();
          updatePositions();
          autoSave();
          status("Undo (" + undoStack.length + " left)");
        }

        /* ── Map interaction ── */
        function mapToGrid(e) {
          let rect = mapEl.getBoundingClientRect();
          let mx = e.clientX - rect.left;
          let my = e.clientY - rect.top;
          let gx = Math.floor(mx / cellSize);
          let gy = Math.floor(my / cellSize);
          return {
            x: Math.max(0, Math.min(TOWN_W - 1, gx)),
            y: Math.max(0, Math.min(TOWN_H - 1, gy)),
          };
        }

        function onMapDown(e) {
          e.preventDefault();
          let { x, y } = mapToGrid(e);

          // Right-click = erase
          if (e.button === 2) {
            pushUndo();
            painting = true;
            grid[y][x] = null;
            renderCell(x, y);
            autoSave();
            return;
          }

          if (activeTool === "paint") {
            if (!selectedTile) {
              status("Select a tile first");
              return;
            }
            pushUndo();
            painting = true;
            grid[y][x] = selectedTile;
            renderCell(x, y);
          } else if (activeTool === "erase") {
            pushUndo();
            painting = true;
            grid[y][x] = null;
            renderCell(x, y);
          } else if (activeTool === "place") {
            if (!selectedBuildingTemplate) {
              status("Select a building first");
              return;
            }
            pushUndo();
            // Clear tiles under the building footprint
            let tmpl = selectedBuildingTemplate;
            for (let dy = 0; dy < tmpl.height; dy++) {
              for (let dx = 0; dx < tmpl.width; dx++) {
                let gx2 = x + dx, gy2 = y + dy;
                if (gx2 < TOWN_W && gy2 < TOWN_H) {
                  grid[gy2][gx2] = null;
                  renderCell(gx2, gy2);
                }
              }
            }
            placedBuildings.push({
              templateId: selectedBuildingTemplate.id,
              x,
              y,
            });
            renderOverlays();
            autoSave();
            status("Placed: " + selectedBuildingTemplate.name);
          } else if (activeTool === "mine") {
            pushUndo();
            if (!Array.isArray(minePos)) minePos = minePos ? [minePos] : [];
            minePos.push({ x, y });
            renderOverlays();
            updatePositions();
            autoSave();
          } else if (activeTool === "spawn") {
            pushUndo();
            spawnPos = { x, y };
            renderOverlays();
            updatePositions();
            autoSave();
          }

          // Check if clicked on a building (for selection)
          if (activeTool === "place") {
            let idx = findBuildingAt(x, y);
            if (idx >= 0) {
              selectedPlacedIdx = idx;
              renderOverlays();
              updateSelection();
            }
          }
        }

        function onMapMove(e) {
          let { x, y } = mapToGrid(e);
          $("#status-pos").textContent = "(" + x + ", " + y + ")";

          // Hover preview
          if (activeTool === "paint" && selectedTile && !painting) {
            let scale = cellSize === 16 ? 0.5 : 1;
            let cp = TILE * scale;
            hoverEl.style.display = "";
            hoverEl.style.left = x * cp + "px";
            hoverEl.style.top = y * cp + "px";
            hoverEl.style.width = cp + "px";
            hoverEl.style.height = cp + "px";
            let t = hoverEl.firstChild;
            t.className = "tile " + selectedTile;
            t.style.cssText =
              "transform:scale(" + scale + ");transform-origin:top left;";
          } else {
            hoverEl.style.display = "none";
          }

          if (!painting) return;
          if (activeTool === "paint" && selectedTile) {
            grid[y][x] = selectedTile;
            renderCell(x, y);
          } else if (activeTool === "erase" || e.buttons === 2) {
            grid[y][x] = null;
            renderCell(x, y);
          }
        }

        function onMapUp() {
          if (painting) {
            painting = false;
            autoSave();
          }
        }

        function onMapLeave() {
          hoverEl.style.display = "none";
        }

        function findBuildingAt(gx, gy) {
          for (let i = placedBuildings.length - 1; i >= 0; i--) {
            let p = placedBuildings[i];
            let tmpl = allBuildings.find((b) => b.id === p.templateId);
            if (!tmpl) continue;
            if (
              gx >= p.x &&
              gx < p.x + tmpl.width &&
              gy >= p.y &&
              gy < p.y + tmpl.height
            )
              return i;
          }
          return -1;
        }

        /* ── UI updates ── */
        function updatePositions() {
          $("#pos-mine").textContent = minePos
            ? "(" + minePos.x + ", " + minePos.y + ")"
            : "—";
          $("#pos-spawn").textContent = spawnPos
            ? "(" + spawnPos.x + ", " + spawnPos.y + ")"
            : "—";
        }

        function updateSelection() {
          let info = $("#selected-building-info");
          let btn = $("#btn-remove-placed");
          if (selectedPlacedIdx >= 0 && placedBuildings[selectedPlacedIdx]) {
            let p = placedBuildings[selectedPlacedIdx];
            let tmpl = allBuildings.find((b) => b.id === p.templateId);
            info.textContent =
              (tmpl ? tmpl.name : p.templateId) +
              " at (" +
              p.x +
              "," +
              p.y +
              ")";
            btn.style.display = "";
          } else {
            info.textContent = "None";
            btn.style.display = "none";
          }
        }

        /* ── Export ── */
        function downloadConfig() {
          let tiles = [];
          for (let y = 0; y < TOWN_H; y++)
            for (let x = 0; x < TOWN_W; x++)
              if (grid[y][x]) tiles.push({ x, y, sprite: grid[y][x] });
          let water = [],
            trees = [],
            paths = [];
          for (let t of tiles) {
            if (t.sprite.startsWith("water-")) water.push({ x: t.x, y: t.y });
            else if (
              t.sprite.startsWith("trees-") ||
              t.sprite.startsWith("plants-")
            )
              trees.push({ x: t.x, y: t.y, sprite: t.sprite });
            else if (
              t.sprite.startsWith("floor-sand") ||
              t.sprite.startsWith("floor-pebble") ||
              t.sprite.startsWith("floor-dirt")
            )
              paths.push({ x: t.x, y: t.y });
          }
          let config = {
            width: TOWN_W,
            height: TOWN_H,
            buildings: placedBuildings.map((p) => ({
              templateId: p.templateId,
              x: p.x,
              y: p.y,
            })),
            tiles,
            water,
            trees,
            paths,
            mineEntrance: minePos,
            playerSpawn: spawnPos,
          };
          let blob = new Blob([JSON.stringify(config, null, 2)], {
            type: "application/json",
          });
          let a = document.createElement("a");
          a.href = URL.createObjectURL(blob);
          a.download = "town-config.json";
          a.click();
          URL.revokeObjectURL(a.href);
          status(
            "Downloaded town-config.json (" +
              tiles.length +
              " tiles, " +
              placedBuildings.length +
              " buildings)",
          );
        }

        /* ── Save / Load ── */
        function autoSave() {
          try {
            let tiles = [];
            for (let y = 0; y < TOWN_H; y++)
              for (let x = 0; x < TOWN_W; x++)
                if (grid[y][x]) tiles.push({ x, y, s: grid[y][x] });
            localStorage.setItem(
              "tb2-state",
              JSON.stringify({
                tiles,
                buildings: placedBuildings,
                mine: minePos,
                spawn: spawnPos,
              }),
            );
          } catch (e) {}
        }

        function loadAutoSave() {
          try {
            let raw = localStorage.getItem("tb2-state");
            if (!raw) return false;
            let s = JSON.parse(raw);
            if (!s.tiles || !s.tiles.length) return false;
            for (let t of s.tiles)
              if (t.x >= 0 && t.x < TOWN_W && t.y >= 0 && t.y < TOWN_H)
                grid[t.y][t.x] = t.s;
            if (s.buildings) placedBuildings = s.buildings;
            if (s.mine) minePos = s.mine;
            if (s.spawn) spawnPos = s.spawn;
            status("Loaded from auto-save");
            return true;
          } catch (e) {
            return false;
          }
        }

        function manualSave() {
          autoSave();
          toast("Progress saved");
        }

        function loadFromFile() {
          $("#file-input").click();
        }

        function handleFileLoad(e) {
          let file = e.target.files[0];
          if (!file) return;
          let reader = new FileReader();
          reader.onload = function (ev) {
            try {
              let cfg = JSON.parse(ev.target.result);
              // Reset grid
              for (let y = 0; y < TOWN_H; y++)
                for (let x = 0; x < TOWN_W; x++) grid[y][x] = null;
              placedBuildings = [];
              minePos = null;
              spawnPos = null;
              // Load tiles
              if (cfg.tiles)
                for (let t of cfg.tiles)
                  if (t.x >= 0 && t.x < TOWN_W && t.y >= 0 && t.y < TOWN_H)
                    grid[t.y][t.x] = t.sprite;
              // Fallback: load from legacy arrays
              if (cfg.water)
                for (let w of cfg.water)
                  if (w.x >= 0 && w.x < TOWN_W && w.y >= 0 && w.y < TOWN_H)
                    grid[w.y][w.x] = grid[w.y][w.x] || "water-deep_water";
              if (cfg.trees)
                for (let t of cfg.trees)
                  if (t.x >= 0 && t.x < TOWN_W && t.y >= 0 && t.y < TOWN_H)
                    grid[t.y][t.x] =
                      grid[t.y][t.x] || t.sprite || "trees-tree1";
              if (cfg.decoration)
                for (let d of cfg.decoration)
                  if (d.x >= 0 && d.x < TOWN_W && d.y >= 0 && d.y < TOWN_H)
                    grid[d.y][d.x] =
                      grid[d.y][d.x] || d.sprite || "floor-grass_flowers0";
              if (cfg.paths)
                for (let p of cfg.paths) {
                  if (p.points)
                    for (let pt of p.points)
                      if (
                        pt[0] >= 0 &&
                        pt[0] < TOWN_W &&
                        pt[1] >= 0 &&
                        pt[1] < TOWN_H
                      )
                        grid[pt[1]][pt[0]] =
                          grid[pt[1]][pt[0]] || "floor-sand5";
                }
              if (cfg.mineEntrance) minePos = cfg.mineEntrance;
              if (cfg.playerSpawn) spawnPos = cfg.playerSpawn;
              if (cfg.buildings)
                placedBuildings = cfg.buildings.map((b) => ({
                  templateId: b.templateId || b.id,
                  x: b.x,
                  y: b.y,
                }));
              undoStack = [];
              renderFull();
              updatePositions();
              autoSave();
              toast("Loaded from file");
              status("Loaded config from file");
            } catch (err) {
              status("Error loading file: " + err.message);
            }
          };
          reader.readAsText(file);
          // Reset input so same file can be loaded again
          e.target.value = "";
        }

        async function resetToConfig() {
          if (
            !confirm("Reset to town-config.json? Unsaved changes will be lost.")
          )
            return;
          localStorage.removeItem("tb2-state");
          for (let y = 0; y < TOWN_H; y++)
            for (let x = 0; x < TOWN_W; x++) grid[y][x] = null;
          placedBuildings = [];
          minePos = null;
          spawnPos = null;
          undoStack = [];
          await loadConfig();
          renderFull();
          updatePositions();
          toast("Reset to town-config.json");
        }

        function toast(msg) {
          let el = $("#toast");
          el.textContent = msg;
          el.classList.add("show");
          setTimeout(() => el.classList.remove("show"), 2000);
        }

        function status(msg) {
          $("#status-msg").textContent = msg;
        }

        /* ── Events ── */
        function wireEvents() {
          // Map interactions
          mapEl.addEventListener("mousedown", onMapDown);
          mapEl.addEventListener("mousemove", onMapMove);
          mapEl.addEventListener("mouseleave", onMapLeave);
          mapEl.addEventListener("contextmenu", (e) => e.preventDefault());
          document.addEventListener("mouseup", onMapUp);

          // Keyboard
          document.addEventListener("keydown", (e) => {
            if (e.ctrlKey && e.key === "z") {
              e.preventDefault();
              undo();
            }
          });

          // Palette search
          $("#palette-search").addEventListener("input", filterPalette);

          // Tools
          document.querySelectorAll("#tools-wrap button").forEach((b) => {
            b.addEventListener("click", () => setTool(b.dataset.tool));
          });

          // Remove building
          $("#btn-remove-placed").addEventListener("click", () => {
            if (selectedPlacedIdx >= 0) {
              pushUndo();
              placedBuildings.splice(selectedPlacedIdx, 1);
              selectedPlacedIdx = -1;
              renderOverlays();
              updateSelection();
              autoSave();
            }
          });

          // Zoom
          $("#btn-zoom").addEventListener("click", () => {
            cellSize = cellSize === 16 ? 32 : 16;
            $("#btn-zoom").textContent = "Zoom: " + cellSize + "px";
            renderFull();
          });

          // Grid toggle
          $("#chk-grid").addEventListener("change", () => {
            showGrid = $("#chk-grid").checked;
            mapEl.classList.toggle("show-grid", showGrid);
          });

          // Labels toggle
          $("#chk-labels").addEventListener("change", () => {
            showLabels = $("#chk-labels").checked;
            renderOverlays();
          });

          // Save/Load buttons
          $("#btn-save").addEventListener("click", manualSave);
          $("#btn-download-config").addEventListener("click", downloadConfig);
          $("#btn-load-file").addEventListener("click", loadFromFile);
          $("#file-input").addEventListener("change", handleFileLoad);
          $("#btn-reset").addEventListener("click", resetToConfig);

          // Left panel tabs
          $("#tab-tiles").addEventListener("click", () => {
            leftTab = "tiles";
            $("#tab-tiles").classList.add("active");
            $("#tab-buildings").classList.remove("active");
            $("#tile-palette-panel").style.display = "";
            $("#building-palette-panel").style.display = "none";
          });
          $("#tab-buildings").addEventListener("click", () => {
            leftTab = "buildings";
            $("#tab-buildings").classList.add("active");
            $("#tab-tiles").classList.remove("active");
            $("#tile-palette-panel").style.display = "none";
            $("#building-palette-panel").style.display = "";
          });
        }

        init();
      })();
    </script>
  </body>
</html>
