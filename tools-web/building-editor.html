<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Building Editor — The Runed Deep</title>
    <link rel="stylesheet" href="../css/sprites/tiles.css" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      :root {
        --bg: #1a1a1a;
        --bg2: #222;
        --bg3: #2a2a2a;
        --gold: #c9a84c;
        --gold2: #e0c068;
        --border: #444;
        --text: #ddd;
        --text2: #999;
        --green: #4caf50;
        --orange: #ff9800;
        --red: #e74c3c;
        --panel: 280px;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: "Segoe UI", system-ui, sans-serif;
        font-size: 14px;
        overflow: hidden;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }
      button {
        background: var(--bg3);
        color: var(--text);
        border: 1px solid var(--border);
        padding: 4px 12px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 13px;
      }
      button:hover {
        border-color: var(--gold);
        color: var(--gold);
      }
      button.active {
        background: var(--gold);
        color: #111;
        border-color: var(--gold2);
      }
      input,
      select,
      textarea {
        background: var(--bg3);
        color: var(--text);
        border: 1px solid var(--border);
        padding: 4px 8px;
        border-radius: 4px;
        font-size: 13px;
      }
      input:focus,
      select:focus,
      textarea:focus {
        outline: none;
        border-color: var(--gold);
      }
      label {
        color: var(--text2);
        font-size: 12px;
      }

      #topbar {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 12px;
        background: var(--bg2);
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
      }
      #topbar h1 {
        font-size: 16px;
        color: var(--gold);
        margin-right: 12px;
        white-space: nowrap;
      }
      .topbar-group {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .topbar-sep {
        width: 1px;
        height: 24px;
        background: var(--border);
        margin: 0 4px;
      }

      #app {
        display: flex;
        flex: 1;
        overflow: hidden;
      }
      .panel {
        width: var(--panel);
        background: var(--bg2);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        flex-shrink: 0;
      }
      .panel.right {
        border-right: none;
        border-left: 1px solid var(--border);
      }
      .panel h3 {
        padding: 8px 10px;
        font-size: 13px;
        color: var(--gold);
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
      }
      #center {
        flex: 1;
        overflow: auto;
        display: flex;
        align-items: flex-start;
        justify-content: flex-start;
        padding: 16px;
      }

      #palette-search {
        margin: 6px 8px;
        width: calc(100% - 16px);
      }
      #palette-tabs {
        display: flex;
        flex-wrap: wrap;
        gap: 2px;
        padding: 4px 6px;
        flex-shrink: 0;
      }
      #palette-tabs button {
        padding: 2px 6px;
        font-size: 11px;
        border-radius: 3px;
      }
      #palette-grid {
        flex: 1;
        overflow-y: auto;
        padding: 6px;
        display: flex;
        flex-wrap: wrap;
        gap: 2px;
        align-content: flex-start;
      }
      .palette-tile {
        width: 34px;
        height: 34px;
        border: 1px solid transparent;
        border-radius: 2px;
        cursor: pointer;
        position: relative;
        flex-shrink: 0;
      }
      .palette-tile:hover {
        border-color: var(--gold);
      }
      .palette-tile.selected {
        border-color: var(--gold);
        box-shadow: 0 0 6px var(--gold);
      }
      .palette-tile .tile {
        display: block;
      }
      .palette-tile[title]:hover::after {
        content: attr(title);
        position: absolute;
        bottom: -20px;
        left: 0;
        background: #000;
        color: #fff;
        font-size: 10px;
        padding: 1px 4px;
        border-radius: 2px;
        white-space: nowrap;
        z-index: 10;
        pointer-events: none;
      }

      #grid-wrap {
        display: inline-block;
        position: relative;
      }
      .grid-row {
        display: flex;
      }
      .grid-cell {
        width: 32px;
        height: 32px;
        border: 1px dotted #333;
        box-sizing: border-box;
        cursor: crosshair;
        position: relative;
      }
      .grid-cell:hover {
        outline: 2px solid var(--gold);
      }
      .grid-cell .tile {
        display: block;
        pointer-events: none;
      }
      .grid-cell.entrance::after {
        content: "E";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(76, 175, 80, 0.45);
        color: #fff;
        font-size: 10px;
        font-weight: bold;
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: none;
        z-index: 2;
      }
      .grid-cell.npc::after {
        content: "N";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(255, 152, 0, 0.45);
        color: #fff;
        font-size: 10px;
        font-weight: bold;
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: none;
        z-index: 2;
      }
      .grid-cell .hover-preview {
        position: absolute;
        top: 0;
        left: 0;
        opacity: 0.4;
        pointer-events: none;
        z-index: 1;
      }

      .prop-group {
        padding: 8px 10px;
        border-bottom: 1px solid var(--border);
      }
      .prop-group label {
        display: block;
        margin-bottom: 2px;
      }
      .prop-group input,
      .prop-group textarea {
        width: 100%;
        margin-bottom: 6px;
      }
      .prop-group textarea {
        height: 48px;
        resize: vertical;
      }
      .marker-btns {
        display: flex;
        gap: 4px;
        flex-wrap: wrap;
      }
      .marker-btns button {
        font-size: 11px;
        padding: 3px 8px;
      }
      .marker-btns button.entrance-mode {
        background: var(--green);
        color: #fff;
        border-color: var(--green);
      }
      .marker-btns button.npc-mode {
        background: var(--orange);
        color: #fff;
        border-color: var(--orange);
      }

      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: var(--bg);
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--gold);
      }

      #statusbar {
        padding: 4px 12px;
        background: var(--bg2);
        border-top: 1px solid var(--border);
        font-size: 11px;
        color: var(--text2);
        flex-shrink: 0;
        display: flex;
        gap: 16px;
      }
    </style>
  </head>
  <body>
    <div id="topbar">
      <h1>Building Editor</h1>
      <div class="topbar-group">
        <select id="building-select">
          <option value="">— Load Building —</option>
        </select>
        <button id="btn-new">New</button>
        <button id="btn-load-all">Load All</button>
        <button id="btn-save">Save Building</button>
        <button id="btn-delete">Delete</button>
        <button id="btn-download-all">Download All</button>
        <div class="topbar-sep"></div>
        <label>W</label
        ><input
          id="grid-w"
          type="number"
          min="1"
          max="50"
          value="7"
          style="width: 48px"
        />
        <label>H</label
        ><input
          id="grid-h"
          type="number"
          min="1"
          max="50"
          value="5"
          style="width: 48px"
        />
      </div>
    </div>

    <div id="app">
      <div class="panel" id="left-panel">
        <h3>Tile Palette</h3>
        <input type="text" id="palette-search" placeholder="Search tiles..." />
        <div id="palette-tabs"></div>
        <div id="palette-grid"></div>
      </div>

      <div id="center">
        <div id="grid-wrap"></div>
      </div>

      <div class="panel right" id="right-panel">
        <h3>Building Properties</h3>
        <div class="prop-group">
          <label>ID</label>
          <input id="prop-id" type="text" placeholder="building-id" />
          <label>Name</label>
          <input id="prop-name" type="text" placeholder="Building Name" />
          <label>Flavor Text</label>
          <textarea id="prop-flavor" placeholder="A description..."></textarea>
        </div>
        <div class="prop-group">
          <label>Markers</label>
          <div class="marker-btns">
            <button id="btn-entrance">Set Entrance</button>
            <button id="btn-npc">Set NPC</button>
          </div>
          <div style="margin-top: 6px; font-size: 11px; color: var(--text2)">
            <div>Entrance: <span id="marker-entrance">—</span></div>
            <div>NPC: <span id="marker-npc">—</span></div>
          </div>
        </div>
        <div class="prop-group">
          <label>Keyboard Shortcuts</label>
          <div style="font-size: 11px; color: var(--text2); line-height: 1.6">
            <div><b>Ctrl+Z</b> — Undo</div>
            <div><b>Right-click</b> — Erase tile</div>
            <div><b>Click+drag</b> — Paint sweep</div>
            <div><b>Esc</b> — Cancel marker mode</div>
          </div>
        </div>
      </div>
    </div>

    <div id="statusbar">
      <span id="status-msg">Ready</span>
      <span id="status-pos"></span>
    </div>

    <script>
      (function () {
        "use strict";

        let manifest = null;
        let tileSprites = [];
        let allBuildings = [];
        let currentBuilding = null;
        let selectedTile = null;
        let markerMode = null;
        let painting = false;
        let undoStack = [];
        const MAX_UNDO = 20;

        const $ = (s) => document.querySelector(s);
        const gridWrap = $("#grid-wrap");
        const paletteGrid = $("#palette-grid");
        const paletteTabs = $("#palette-tabs");
        const searchInput = $("#palette-search");
        const buildingSelect = $("#building-select");

        const categories = [
          { key: "All", folders: null },
          { key: "Walls", folders: ["wall", "vaults"] },
          { key: "Floors", folders: ["floor"] },
          { key: "Doors", folders: ["doors"] },
          { key: "Decor", folders: ["decor", "altars", "gateways", "traps"] },
          { key: "Statues", folders: ["statues"] },
          { key: "Water", folders: ["water"] },
          { key: "Plants", folders: ["plants", "trees"] },
          { key: "Shops", folders: ["shops"] },
        ];
        let activeCategory = "All";

        async function init() {
          try {
            let r = await fetch("../sprites-manifest.json");
            manifest = await r.json();
            tileSprites = manifest.tiles.sprites;
          } catch (e) {
            status("Failed to load sprites manifest");
            return;
          }
          buildPalette();
          buildCategoryTabs();
          await loadAllBuildings();
          loadAutoSave();
          wireEvents();
          if (!currentBuilding) newBuilding();
          status("Ready — " + tileSprites.length + " tiles loaded");
        }

        function buildCategoryTabs() {
          paletteTabs.textContent = "";
          categories.forEach((c) => {
            let b = document.createElement("button");
            b.textContent = c.key;
            if (c.key === activeCategory) b.classList.add("active");
            b.addEventListener("click", () => {
              activeCategory = c.key;
              paletteTabs
                .querySelectorAll("button")
                .forEach((x) => x.classList.remove("active"));
              b.classList.add("active");
              filterPalette();
            });
            paletteTabs.appendChild(b);
          });
        }

        function buildPalette() {
          paletteGrid.textContent = "";
          tileSprites.forEach((s) => {
            let d = document.createElement("div");
            d.className = "palette-tile";
            d.dataset.name = s.className;
            d.dataset.folder = s.subfolder;
            d.title = s.className;
            let t = document.createElement("div");
            t.className = "tile " + s.className;
            d.appendChild(t);
            d.addEventListener("click", () => selectTile(s.className, d));
            paletteGrid.appendChild(d);
          });
          filterPalette();
        }

        function filterPalette() {
          let search = searchInput.value.toLowerCase();
          let cat = categories.find((c) => c.key === activeCategory);
          let folders = cat ? cat.folders : null;
          paletteGrid.querySelectorAll(".palette-tile").forEach((el) => {
            let name = el.dataset.name.toLowerCase();
            let folder = el.dataset.folder;
            let showCat = !folders || folders.includes(folder);
            let showSearch = !search || name.includes(search);
            el.style.display = showCat && showSearch ? "" : "none";
          });
        }

        function selectTile(className, el) {
          paletteGrid
            .querySelectorAll(".palette-tile")
            .forEach((x) => x.classList.remove("selected"));
          if (selectedTile === className) {
            selectedTile = null;
            return;
          }
          selectedTile = className;
          if (el) el.classList.add("selected");
          markerMode = null;
          updateMarkerButtons();
        }

        async function loadAllBuildings() {
          try {
            let r = await fetch("../town-buildings.json");
            allBuildings = await r.json();
          } catch (e) {
            allBuildings = [];
          }
          populateBuildingSelect();
        }

        function populateBuildingSelect() {
          buildingSelect.textContent = "";
          let opt = document.createElement("option");
          opt.value = "";
          opt.textContent = "— Load Building —";
          buildingSelect.appendChild(opt);
          allBuildings.forEach((b, i) => {
            let o = document.createElement("option");
            o.value = i;
            o.textContent = b.name + " (" + b.id + ")";
            buildingSelect.appendChild(o);
          });
        }

        function newBuilding() {
          let w = parseInt($("#grid-w").value) || 7;
          let h = parseInt($("#grid-h").value) || 5;
          currentBuilding = {
            id: "new-building",
            name: "New Building",
            flavor: "",
            width: w,
            height: h,
            tiles: makeEmptyTiles(w, h),
            entrance: [],
            npc: null,
          };
          undoStack = [];
          renderGrid();
          updateProps();
        }

        function makeEmptyTiles(w, h) {
          let t = [];
          for (let y = 0; y < h; y++) {
            let row = [];
            for (let x = 0; x < w; x++) row.push(null);
            t.push(row);
          }
          return t;
        }

        function loadBuilding(idx) {
          if (idx === "" || idx === undefined) return;
          let b = allBuildings[parseInt(idx)];
          if (!b) return;
          currentBuilding = JSON.parse(JSON.stringify(b));
          $("#grid-w").value = b.width;
          $("#grid-h").value = b.height;
          undoStack = [];
          renderGrid();
          updateProps();
          status("Loaded: " + b.name);
        }

        function deleteBuilding() {
          if (!currentBuilding) return;
          let idx = allBuildings.findIndex((b) => b.id === currentBuilding.id);
          if (idx === -1) {
            status("Building not in collection");
            return;
          }
          if (!confirm('Delete "' + currentBuilding.name + '"?')) return;
          allBuildings.splice(idx, 1);
          populateBuildingSelect();
          newBuilding();
          status("Deleted");
        }

        function saveBuilding() {
          if (!currentBuilding) return;
          currentBuilding.id = $("#prop-id").value || currentBuilding.id;
          currentBuilding.name = $("#prop-name").value || currentBuilding.name;
          currentBuilding.flavor = $("#prop-flavor").value || "";
          let idx = allBuildings.findIndex((b) => b.id === currentBuilding.id);
          let data = JSON.parse(JSON.stringify(currentBuilding));
          if (idx >= 0) allBuildings[idx] = data;
          else allBuildings.push(data);
          populateBuildingSelect();
          autoSave();
          status("Saved: " + currentBuilding.name);
        }

        function downloadAll() {
          let blob = new Blob([JSON.stringify(allBuildings, null, 2)], {
            type: "application/json",
          });
          let a = document.createElement("a");
          a.href = URL.createObjectURL(blob);
          a.download = "town-buildings.json";
          a.click();
          URL.revokeObjectURL(a.href);
        }

        function pushUndo() {
          undoStack.push(JSON.stringify(currentBuilding.tiles));
          if (undoStack.length > MAX_UNDO) undoStack.shift();
        }

        function undo() {
          if (!undoStack.length) return;
          currentBuilding.tiles = JSON.parse(undoStack.pop());
          renderGrid();
          autoSave();
        }

        function renderGrid() {
          if (!currentBuilding) return;
          gridWrap.textContent = "";
          let { width: w, height: h, tiles } = currentBuilding;
          for (let y = 0; y < h; y++) {
            let row = document.createElement("div");
            row.className = "grid-row";
            for (let x = 0; x < w; x++) {
              let cell = document.createElement("div");
              cell.className = "grid-cell";
              cell.dataset.x = x;
              cell.dataset.y = y;
              let t = tiles[y] && tiles[y][x];
              if (t) {
                let sp = document.createElement("div");
                sp.className = "tile " + t.sprite;
                cell.appendChild(sp);
              }
              const entrances = Array.isArray(currentBuilding.entrance)
                ? currentBuilding.entrance
                : currentBuilding.entrance ? [currentBuilding.entrance] : [];
              if (entrances.some(e => e.x === x && e.y === y))
                cell.classList.add("entrance");
              if (
                currentBuilding.npc &&
                currentBuilding.npc.x === x &&
                currentBuilding.npc.y === y
              )
                cell.classList.add("npc");
              cell.addEventListener("mousedown", (e) => onCellDown(e, x, y));
              cell.addEventListener("mouseenter", (e) => onCellEnter(e, x, y));
              cell.addEventListener("mouseleave", (e) => onCellLeave(e, x, y));
              cell.addEventListener("contextmenu", (e) => {
                e.preventDefault();
                eraseTile(x, y);
              });
              row.appendChild(cell);
            }
            gridWrap.appendChild(row);
          }
        }

        function getCell(x, y) {
          return gridWrap.querySelector(
            `.grid-cell[data-x="${x}"][data-y="${y}"]`,
          );
        }

        function onCellDown(e, x, y) {
          e.preventDefault();
          if (e.button === 2) return;
          if (markerMode === "entrance") {
            if (!Array.isArray(currentBuilding.entrance))
              currentBuilding.entrance = currentBuilding.entrance ? [currentBuilding.entrance] : [];
            const idx = currentBuilding.entrance.findIndex(e => e.x === x && e.y === y);
            if (idx >= 0) {
              currentBuilding.entrance.splice(idx, 1);
            } else {
              currentBuilding.entrance.push({ x, y });
            }
            updateProps();
            renderGrid();
            autoSave();
            return;
          }
          if (markerMode === "npc") {
            currentBuilding.npc = { x, y };
            markerMode = null;
            updateMarkerButtons();
            renderGrid();
            autoSave();
            return;
          }
          if (!selectedTile) return;
          pushUndo();
          painting = true;
          paintTile(x, y);
        }

        function onCellEnter(e, x, y) {
          if (painting && selectedTile) paintTile(x, y);
          if (selectedTile && !painting) {
            let cell = getCell(x, y);
            if (cell) {
              let existing = cell.querySelector(".hover-preview");
              if (!existing) {
                let p = document.createElement("div");
                p.className = "tile hover-preview " + selectedTile;
                cell.appendChild(p);
              }
            }
          }
          $("#status-pos").textContent = `(${x}, ${y})`;
        }

        function onCellLeave(e, x, y) {
          let cell = getCell(x, y);
          if (cell) {
            let p = cell.querySelector(".hover-preview");
            if (p) p.remove();
          }
        }

        function paintTile(x, y) {
          if (!currentBuilding || !selectedTile) return;
          let type = inferType(selectedTile);
          currentBuilding.tiles[y][x] = { sprite: selectedTile, type };
          let cell = getCell(x, y);
          if (!cell) return;
          let old = cell.querySelector(".tile:not(.hover-preview)");
          if (old) old.remove();
          let sp = document.createElement("div");
          sp.className = "tile " + selectedTile;
          cell.insertBefore(sp, cell.firstChild);
        }

        function eraseTile(x, y) {
          if (!currentBuilding) return;
          pushUndo();
          currentBuilding.tiles[y][x] = null;
          let cell = getCell(x, y);
          if (cell) {
            let old = cell.querySelector(".tile:not(.hover-preview)");
            if (old) old.remove();
          }
          autoSave();
        }

        function inferType(className) {
          if (className.startsWith("wall-") || className.startsWith("vaults-"))
            return "wall";
          if (className.startsWith("floor-")) return "floor";
          if (className.startsWith("doors-")) return "door";
          if (className.startsWith("water-")) return "water";
          if (className.startsWith("plants-") || className.startsWith("trees-"))
            return "plant";
          return "decor";
        }

        function resizeGrid() {
          if (!currentBuilding) return;
          let nw = parseInt($("#grid-w").value) || 7;
          let nh = parseInt($("#grid-h").value) || 5;
          pushUndo();
          let oldT = currentBuilding.tiles;
          let newT = makeEmptyTiles(nw, nh);
          for (let y = 0; y < Math.min(nh, oldT.length); y++) {
            for (let x = 0; x < Math.min(nw, (oldT[y] || []).length); x++) {
              newT[y][x] = oldT[y][x];
            }
          }
          currentBuilding.tiles = newT;
          currentBuilding.width = nw;
          currentBuilding.height = nh;
          renderGrid();
          autoSave();
        }

        function updateProps() {
          if (!currentBuilding) return;
          $("#prop-id").value = currentBuilding.id || "";
          $("#prop-name").value = currentBuilding.name || "";
          $("#prop-flavor").value = currentBuilding.flavor || "";
          const entrances = Array.isArray(currentBuilding.entrance)
            ? currentBuilding.entrance
            : currentBuilding.entrance ? [currentBuilding.entrance] : [];
          $("#marker-entrance").textContent = entrances.length > 0
            ? entrances.map(e => `(${e.x},${e.y})`).join(" ")
            : "—";
          let n = currentBuilding.npc;
          $("#marker-npc").textContent = n ? `(${n.x}, ${n.y})` : "—";
        }

        function updateMarkerButtons() {
          $("#btn-entrance").classList.toggle(
            "entrance-mode",
            markerMode === "entrance",
          );
          $("#btn-npc").classList.toggle("npc-mode", markerMode === "npc");
          updateProps();
        }

        function autoSave() {
          try {
            localStorage.setItem("be-buildings", JSON.stringify(allBuildings));
            if (currentBuilding)
              localStorage.setItem(
                "be-current",
                JSON.stringify(currentBuilding),
              );
          } catch (e) {}
        }

        function loadAutoSave() {
          try {
            let b = localStorage.getItem("be-buildings");
            if (b) {
              let parsed = JSON.parse(b);
              if (parsed.length) allBuildings = parsed;
              populateBuildingSelect();
            }
            let c = localStorage.getItem("be-current");
            if (c) {
              currentBuilding = JSON.parse(c);
              $("#grid-w").value = currentBuilding.width;
              $("#grid-h").value = currentBuilding.height;
              renderGrid();
              updateProps();
            }
          } catch (e) {}
        }

        function status(msg) {
          $("#status-msg").textContent = msg;
        }

        function wireEvents() {
          document.addEventListener("mouseup", () => {
            if (painting) {
              painting = false;
              autoSave();
            }
          });
          document.addEventListener("keydown", (e) => {
            if (e.ctrlKey && e.key === "z") {
              e.preventDefault();
              undo();
            }
            if (e.key === "Escape") {
              markerMode = null;
              updateMarkerButtons();
            }
          });

          searchInput.addEventListener("input", filterPalette);
          buildingSelect.addEventListener("change", (e) =>
            loadBuilding(e.target.value),
          );
          $("#btn-new").addEventListener("click", newBuilding);
          $("#btn-load-all").addEventListener("click", loadAllBuildings);
          $("#btn-save").addEventListener("click", saveBuilding);
          $("#btn-delete").addEventListener("click", deleteBuilding);
          $("#btn-download-all").addEventListener("click", downloadAll);
          $("#grid-w").addEventListener("change", resizeGrid);
          $("#grid-h").addEventListener("change", resizeGrid);

          $("#btn-entrance").addEventListener("click", () => {
            markerMode = markerMode === "entrance" ? null : "entrance";
            updateMarkerButtons();
            status(markerMode ? "Click a cell to set entrance" : "Cancelled");
          });
          $("#btn-npc").addEventListener("click", () => {
            markerMode = markerMode === "npc" ? null : "npc";
            updateMarkerButtons();
            status(
              markerMode ? "Click a cell to set NPC position" : "Cancelled",
            );
          });

          ["prop-id", "prop-name", "prop-flavor"].forEach((id) => {
            $("#" + id).addEventListener("input", () => {
              if (!currentBuilding) return;
              currentBuilding.id = $("#prop-id").value;
              currentBuilding.name = $("#prop-name").value;
              currentBuilding.flavor = $("#prop-flavor").value;
              autoSave();
            });
          });
        }

        init();
      })();
    </script>
  </body>
</html>
