<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tile Browser — The Runed Deep</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="stylesheet" href="/css/sprites/tiles.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #111; color: #ccc; font-family: 'Segoe UI', sans-serif; padding: 20px 20px 80px; }
    h1 { color: #c90; margin-bottom: 4px; font-size: 24px; }
    .subtitle { color: #666; font-size: 13px; margin-bottom: 12px; }
    h2 { color: #c90; font-size: 16px; margin: 24px 0 8px; border-bottom: 1px solid #333; padding-bottom: 4px; }
    .controls { display: flex; gap: 12px; margin-bottom: 16px; align-items: center; }
    .toggle-btn {
      padding: 4px 12px; font-size: 12px; cursor: pointer; border-radius: 3px;
      border: 1px solid #555; background: #222; color: #888;
    }
    .toggle-btn.on { background: #446; color: #aaf; border-color: #558; }
    .grid { display: flex; flex-direction: column; gap: 2px; }
    .row {
      display: flex; align-items: center; gap: 10px;
      background: #1a1a1a; border: 1px solid #333; border-radius: 4px;
      padding: 4px 10px; cursor: pointer; transition: background 0.1s;
    }
    .row:hover { background: #222; border-color: #555; }
    .row.has-note { border-left: 3px solid #c90; }
    .tile-pair { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
    .sprite { width: 32px; height: 32px; flex-shrink: 0; display: inline-block; border: 1px solid #333; }
    .old-tile { width: 32px; height: 32px; image-rendering: pixelated; border: 1px solid #333; }
    .tile-pair { transform: scale(1.5); transform-origin: left center; margin-right: 32px; }
    .label-col { display: flex; flex-direction: column; gap: 1px; flex: 1; }
    .tile-name { font-size: 13px; color: #ccc; font-family: monospace; }
    .tile-use { font-size: 11px; color: #888; }
    .tag { font-size: 10px; padding: 1px 5px; border-radius: 2px; }
    .tag-active { background: #143; color: #4c4; }
    .tag-unused { background: #333; color: #666; }
    .tag-blank { background: #222; color: #444; }
    .arrow { color: #555; font-size: 14px; flex-shrink: 0; }
    .pos-info { font-size: 10px; color: #444; font-family: monospace; width: 80px; text-align: right; flex-shrink: 0; }
    .note-icon { color: #c90; font-size: 11px; flex-shrink: 0; width: 16px; text-align: center; }
    .pair-label { font-size: 9px; color: #555; text-align: center; }

    .note-editor {
      display: none; padding: 6px 10px 8px;
      background: #151515; border: 1px solid #333; border-top: none;
      border-radius: 0 0 4px 4px; margin-top: -3px; margin-bottom: 2px;
    }
    .note-editor.open { display: block; }
    .note-editor textarea {
      width: 100%; height: 50px; background: #1a1a1a; color: #ccc;
      border: 1px solid #444; padding: 6px; font-size: 12px;
      font-family: inherit; resize: vertical;
    }
    .note-editor textarea:focus { outline: none; border-color: #c90; }
    .note-editor .note-meta { font-size: 10px; color: #555; margin-top: 4px; }

    .copy-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #1a1a1a; border-top: 1px solid #333;
      padding: 8px 20px; display: flex; align-items: center; gap: 12px; z-index: 100;
    }
    .copy-bar .count { font-size: 13px; color: #c90; }
    .copy-btn {
      padding: 6px 16px; background: #446; color: #aaf; border: 1px solid #558;
      cursor: pointer; font-size: 13px; border-radius: 4px;
    }
    .copy-btn:hover { background: #558; }
    .clear-btn {
      padding: 6px 16px; background: #333; color: #888; border: 1px solid #444;
      cursor: pointer; font-size: 13px; border-radius: 4px;
    }
    .clear-btn:hover { background: #444; color: #ccc; }
    .copied-msg { color: #4c4; font-size: 12px; display: none; }
  </style>
</head>
<body>
  <h1>Tile Browser</h1>
  <div class="subtitle">All tiles — original (pre-DCSS) vs current. Click to add notes.</div>
  <div class="controls" id="controls"></div>
  <div id="content"></div>

  <div class="copy-bar">
    <span class="count" id="noteCount">0 notes</span>
    <button class="copy-btn" id="copyBtn">Copy All Notes</button>
    <button class="clear-btn" id="clearBtn">Clear All</button>
    <span class="copied-msg" id="copiedMsg">Copied!</span>
  </div>

  <script>
    const TILES = [
      { name: 'rock', oldPos: [0, 0], newPos: [0, 0], use: 'Dungeon walls (all tiers)', active: true, cat: 'Dungeon' },
      { name: 'mine-entrance', oldPos: [64, 0], newPos: [64, 0], use: 'Town mine entrance (stairs-down)', active: true, cat: 'Town' },
      { name: 'portcullis-closed', oldPos: [96, 0], newPos: [96, 0], use: 'Closed portcullis', active: false, cat: 'Structures' },
      { name: 'portcullis-open', oldPos: [128, 0], newPos: [128, 0], use: 'Open portcullis', active: false, cat: 'Structures' },
      { name: 'sign', oldPos: [160, 0], newPos: [160, 0], use: 'Town sign', active: false, cat: 'Structures' },
      { name: 'grass', oldPos: [0, 32], newPos: [224, 0], use: 'Town ground / building underlay', active: true, cat: 'Town' },
      { name: 'dark-dgn', oldPos: [0, 64], newPos: [0, 32], use: 'Dungeon floor (main floor tile)', active: true, cat: 'Dungeon' },
      { name: 'water', oldPos: [0, 96], newPos: [224, 32], use: 'Water tile', active: true, cat: 'Dungeon' },
      { name: 'altar', oldPos: [128, 96], newPos: [352, 32], use: 'Altar', active: false, cat: 'Dungeon' },
      { name: 'status', oldPos: [160, 96], newPos: [384, 32], use: 'Statue', active: false, cat: 'Dungeon' },
      { name: 'pillar-stone', oldPos: [160, 32], newPos: [384, 0], use: 'Stone pillar', active: false, cat: 'Dungeon' },

      { name: 'path', oldPos: [0, 128], newPos: [0, 64], use: 'Stone path (town)', active: true, cat: 'Town' },
      { name: 'stairs-up', oldPos: [64, 128], newPos: [64, 64], use: 'Stairs up (floor transition)', active: true, cat: 'Dungeon' },
      { name: 'stairs-down', oldPos: [96, 128], newPos: [96, 64], use: 'Stairs down (floor transition)', active: true, cat: 'Dungeon' },
      { name: 'town-wall', oldPos: [192, 128], newPos: [192, 64], use: 'Town fence segment', active: true, cat: 'Town' },
      { name: 'lit-dgn', oldPos: [0, 160], newPos: [224, 64], use: 'Dungeon floor (Light spell — blue tint)', active: true, cat: 'Dungeon' },
      { name: 'door-closed', oldPos: [64, 160], newPos: [288, 64], use: 'Closed door', active: true, cat: 'Dungeon' },
      { name: 'door-open', oldPos: [96, 160], newPos: [320, 64], use: 'Open door', active: true, cat: 'Dungeon' },
      { name: 'pillar-broken', oldPos: [192, 160], newPos: [416, 64], use: 'Broken pillar', active: false, cat: 'Dungeon' },
      { name: 'gold', oldPos: [128, 192], newPos: [128, 96], use: 'Gold pile', active: true, cat: 'Dungeon' },

      { name: 'alter', oldPos: [192, 192], newPos: [192, 96], use: 'Altar (ignis)', active: false, cat: 'Dungeon' },
      { name: 'stone-coffin', oldPos: [96, 224], newPos: [320, 96], use: 'Stone coffin', active: false, cat: 'Dungeon' },
      { name: 'fountain', oldPos: [128, 224], newPos: [352, 96], use: 'Blood fountain', active: false, cat: 'Dungeon' },

      { name: 'pit-trap', oldPos: [0, 256], newPos: [0, 128], use: 'Pit trap (revealed)', active: true, cat: 'Traps' },
      { name: 'arrow-trap', oldPos: [32, 256], newPos: [32, 128], use: 'Arrow trap (revealed)', active: true, cat: 'Traps' },
      { name: 'portal-trap', oldPos: [64, 256], newPos: [64, 128], use: 'Portal trap', active: true, cat: 'Traps' },
      { name: 'wind-trap', oldPos: [96, 256], newPos: [96, 128], use: 'Wind trap', active: false, cat: 'Traps' },
      { name: 'dart-trap', oldPos: [160, 256], newPos: [160, 128], use: 'Dart trap', active: true, cat: 'Traps' },
      { name: 'cobweb-trap', oldPos: [192, 256], newPos: [192, 128], use: 'Cobweb trap', active: false, cat: 'Traps' },
      { name: 'lightning-trap', oldPos: [0, 288], newPos: [224, 128], use: 'Lightning trap', active: false, cat: 'Traps' },
      { name: 'fire-trap', oldPos: [32, 288], newPos: [256, 128], use: 'Fire trap', active: true, cat: 'Traps' },
      { name: 'acid-trap', oldPos: [64, 288], newPos: [288, 128], use: 'Acid trap', active: true, cat: 'Traps' },
      { name: 'target-trap', oldPos: [96, 288], newPos: [320, 128], use: 'Target trap', active: false, cat: 'Traps' },
      { name: 'blood-trap', oldPos: [160, 288], newPos: [384, 128], use: 'Blood splatter decal', active: true, cat: 'Dungeon' },
      { name: 'rune-trap', oldPos: [192, 288], newPos: [416, 128], use: 'Rune trap', active: false, cat: 'Traps' },
    ];

    const STORAGE_KEY = 'rd-tile-notes';
    const notes = {};
    try { Object.assign(notes, JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}')); } catch {}
    function saveNotes() { localStorage.setItem(STORAGE_KEY, JSON.stringify(notes)); updateCount(); }
    function updateCount() {
      const c = Object.values(notes).filter(n => n.trim()).length;
      document.getElementById('noteCount').textContent = c + ' note' + (c !== 1 ? 's' : '');
    }

    let showActive = true, showUnused = true;
    const content = document.getElementById('content');
    const controls = document.getElementById('controls');

    // Filter toggles
    const activeBtn = document.createElement('button');
    activeBtn.className = 'toggle-btn on';
    activeBtn.textContent = 'Active';
    activeBtn.addEventListener('click', () => { showActive = !showActive; activeBtn.classList.toggle('on', showActive); renderAll(); });
    controls.appendChild(activeBtn);

    const unusedBtn = document.createElement('button');
    unusedBtn.className = 'toggle-btn on';
    unusedBtn.textContent = 'Unused';
    unusedBtn.addEventListener('click', () => { showUnused = !showUnused; unusedBtn.classList.toggle('on', showUnused); renderAll(); });
    controls.appendChild(unusedBtn);


    const countLabel = document.createElement('span');
    countLabel.style.cssText = 'font-size:12px;color:#555;';
    controls.appendChild(countLabel);

    // Load old spritesheet
    const oldImg = new Image();
    oldImg.src = '/assets/tiles-original.png';
    oldImg.onload = () => renderAll();

    function renderAll() {
      content.replaceChildren();
      const cats = {};
      for (const t of TILES) {
        if (t.active && !showActive) continue;
        if (!t.active && !showUnused) continue;
        if (!cats[t.cat]) cats[t.cat] = [];
        cats[t.cat].push(t);
      }

      let shown = 0;
      for (const [cat, tiles] of Object.entries(cats)) {
        const h2 = document.createElement('h2');
        const ac = tiles.filter(t => t.active).length;
        h2.textContent = cat + ' (' + tiles.length + ', ' + ac + ' active)';
        content.appendChild(h2);

        const grid = document.createElement('div');
        grid.className = 'grid';

        for (const t of tiles) {
          shown++;
          const row = document.createElement('div');
          row.className = 'row' + (notes[t.name]?.trim() ? ' has-note' : '');

          // Old tile (canvas crop from pre-DCSS spritesheet)
          const pair = document.createElement('div');
          pair.className = 'tile-pair';

          const oldCanvas = document.createElement('canvas');
          oldCanvas.width = 32; oldCanvas.height = 32;
          oldCanvas.style.cssText = 'width:32px;height:32px;image-rendering:pixelated;border:1px solid #333;';
          if (oldImg.complete && oldImg.naturalWidth > 0) {
            const ctx = oldCanvas.getContext('2d');
            ctx.drawImage(oldImg, t.oldPos[0], t.oldPos[1], 32, 32, 0, 0, 32, 32);
          }
          pair.appendChild(oldCanvas);

          const arrow = document.createElement('span');
          arrow.className = 'arrow';
          arrow.textContent = '\u2192';
          pair.appendChild(arrow);

          const cur = document.createElement('div');
          cur.className = 'sprite ' + t.name;
          pair.appendChild(cur);
          row.appendChild(pair);

          // Labels
          const labels = document.createElement('div');
          labels.className = 'label-col';
          const nameEl = document.createElement('span');
          nameEl.className = 'tile-name';
          nameEl.textContent = t.name;
          labels.appendChild(nameEl);
          const useEl = document.createElement('span');
          useEl.className = 'tile-use';
          useEl.textContent = t.use;
          labels.appendChild(useEl);
          row.appendChild(labels);

          // Note icon
          const noteIcon = document.createElement('span');
          noteIcon.className = 'note-icon';
          noteIcon.textContent = notes[t.name]?.trim() ? '\u270E' : '';
          row.appendChild(noteIcon);

          // Tag
          const tag = document.createElement('span');
          tag.className = 'tag ' + (t.active ? 'tag-active' : 'tag-unused');
          tag.textContent = t.active ? 'ACTIVE' : 'unused';
          row.appendChild(tag);

          // Position
          const posEl = document.createElement('span');
          posEl.className = 'pos-info';
          posEl.textContent = t.newPos[0] + ', ' + t.newPos[1];
          row.appendChild(posEl);

          // Note editor
          const editor = document.createElement('div');
          editor.className = 'note-editor';
          const textarea = document.createElement('textarea');
          textarea.value = notes[t.name] || '';
          textarea.placeholder = 'Add notes for ' + t.name + '...';
          textarea.addEventListener('input', () => {
            notes[t.name] = textarea.value;
            saveNotes();
            row.classList.toggle('has-note', textarea.value.trim().length > 0);
            noteIcon.textContent = textarea.value.trim() ? '\u270E' : '';
          });
          textarea.addEventListener('click', (e) => e.stopPropagation());
          editor.appendChild(textarea);
          const meta = document.createElement('div');
          meta.className = 'note-meta';
          meta.textContent = 'css: .' + t.name + '  |  old pos: ' + t.oldPos[0] + ',' + t.oldPos[1] + '  |  new pos: ' + t.newPos[0] + ',' + t.newPos[1];
          editor.appendChild(meta);

          row.addEventListener('click', () => {
            const isOpen = editor.classList.contains('open');
            document.querySelectorAll('.note-editor.open').forEach(e => e.classList.remove('open'));
            if (!isOpen) { editor.classList.add('open'); textarea.focus(); }
          });

          grid.appendChild(row);
          grid.appendChild(editor);
        }
        content.appendChild(grid);
      }
      countLabel.textContent = shown + ' / ' + TILES.length + ' shown';
    }

    // Copy all notes
    document.getElementById('copyBtn').addEventListener('click', () => {
      const lines = ['# Tile Notes for The Runed Deep', ''];
      for (const t of TILES) {
        const note = notes[t.name]?.trim();
        if (!note) continue;
        lines.push('## ' + t.name);
        lines.push('- **css:** `.' + t.name + '`');
        lines.push('- **position:** ' + t.newPos[0] + 'px, ' + t.newPos[1] + 'px');
        lines.push('- **used for:** ' + t.use);
        lines.push('- **status:** ' + (t.active ? 'ACTIVE' : 'unused'));
        lines.push('');
        lines.push('**Note:** ' + note);
        lines.push('');
        lines.push('---');
        lines.push('');
      }
      navigator.clipboard.writeText(lines.join('\n')).then(() => {
        const msg = document.getElementById('copiedMsg');
        msg.style.display = 'inline';
        setTimeout(() => { msg.style.display = 'none'; }, 2000);
      });
    });

    document.getElementById('clearBtn').addEventListener('click', () => {
      if (!confirm('Clear all notes?')) return;
      for (const k of Object.keys(notes)) delete notes[k];
      saveNotes();
      renderAll();
    });

    updateCount();
  </script>
</body>
</html>
